<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>شهادة إتمام - منصة البرمجة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0a1f 0%, #1a1330 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .certificate-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .certificate {
            background: linear-gradient(145deg, #1a1330, #131025);
            border: 5px solid #6d4fc7;
            border-radius: 50px;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(109, 79, 199, 0.5);
        }

        .certificate::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(109, 79, 199, 0.03) 20px,
                rgba(109, 79, 199, 0.03) 40px
            );
            pointer-events: none;
        }

        .certificate::after {
            content: '✧';
            position: absolute;
            bottom: 20px;
            left: 30px;
            font-size: 100px;
            color: rgba(109, 79, 199, 0.1);
            transform: rotate(-15deg);
        }

        .seal {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            border: 3px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #ffd700;
            transform: rotate(-15deg);
            opacity: 0.8;
        }

        .seal::before {
            content: '★';
            font-size: 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 60px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            letter-spacing: 2px;
        }

        .header h2 {
            font-size: 32px;
            color: #b49aff;
            font-weight: 700;
            border-bottom: 2px solid #6d4fc7;
            padding-bottom: 20px;
            display: inline-block;
        }

        .content {
            text-align: center;
            margin: 50px 0;
        }

        .certify-text {
            font-size: 24px;
            color: #d0c2e6;
            margin-bottom: 20px;
        }

        .student-name {
            font-size: 48px;
            font-weight: 900;
            color: white;
            margin: 30px 0;
            padding: 20px 40px;
            background: rgba(109, 79, 199, 0.2);
            border-radius: 80px;
            display: inline-block;
            border: 2px dashed #6d4fc7;
        }

        .course-name {
            font-size: 36px;
            font-weight: 700;
            color: #b49aff;
            margin: 20px 0;
        }

        .date {
            font-size: 20px;
            color: #b1a4c2;
            margin: 30px 0;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid #2d224a;
        }

        .signature {
            text-align: center;
        }

        .signature-line {
            width: 200px;
            height: 2px;
            background: #6d4fc7;
            margin-bottom: 10px;
        }

        .signature-title {
            color: #b1a4c2;
            font-size: 14px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #6d4fc7;
            font-size: 18px;
        }

        .logo i {
            font-size: 40px;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(109, 79, 199, 0.4);
        }

        .btn-secondary {
            background: #2d224a;
            color: #b49aff;
            border: 1px solid #6d4fc7;
        }

        .btn-secondary:hover {
            background: #3a2d5a;
            transform: translateY(-3px);
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .certificate-container {
                max-width: 100%;
            }
            .certificate {
                border: 2px solid #000;
                box-shadow: none;
            }
            .btn {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .certificate {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 40px;
            }
            .student-name {
                font-size: 32px;
            }
            .course-name {
                font-size: 24px;
            }
            .footer {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="certificate-container" id="certificateContainer">
        <!-- سيتم ملؤها بالجافاسكريبت -->
    </div>

    <script>
        // استخراج البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const studentName = decodeURIComponent(urlParams.get('name') || 'الطالب');
        const courseName = decodeURIComponent(urlParams.get('course') || 'الدورة');
        const date = decodeURIComponent(urlParams.get('date') || new Date().toLocaleDateString('ar-EG'));

        const certificateHTML = `
            <div class="certificate">
                <div class="seal"></div>
                
                <div class="header">
                    <h1>شهادة إتمام</h1>
                    <h2>منصة البرمجة التعليمية</h2>
                </div>

                <div class="content">
                    <div class="certify-text">يشهد مركز التدريب بأن</div>
                    <div class="student-name">${studentName}</div>
                    <div class="certify-text">قد أتم بنجاح دورة</div>
                    <div class="course-name">${courseName}</div>
                    <div class="date">وذلك في يوم: ${date}</div>
                </div>

                <div class="footer">
                    <div class="signature">
                        <div class="signature-line"></div>
                        <div class="signature-title">مدير المنصة</div>
                    </div>
                    <div class="logo">
                        <i class="fas fa-code"></i>
                        <span>EduTech</span>
                    </div>
                    <div class="signature">
                        <div class="signature-line"></div>
                        <div class="signature-title">ختم المنصة</div>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="window.print()">
                        <i class="fas fa-print"></i>
                        طباعة الشهادة
                    </button>
                    <button class="btn btn-secondary" onclick="window.close()">
                        <i class="fas fa-times"></i>
                        إغلاق
                    </button>
                </div>
            </div>
        `;

        document.getElementById('certificateContainer').innerHTML = certificateHTML;

        // إضافة أيقونات Font Awesome
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
        document.head.appendChild(link);
    </script>
</body>
</html>
