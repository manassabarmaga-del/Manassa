<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>👑 اشتراكاتي - منصة البرمجة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #0f0a1f 0%, #1a1330 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(109, 79, 199, 0.3);
            border-radius: 50%;
            animation: float 8s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }
        }

        .content {
            padding: 70px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* شاشة تحميل */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* حالة عدم اتصال */
        .offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #c44545;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        .offline-banner.show { transform: translateY(0); }

        /* التابات السفلية */
        .tabs-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 19, 48, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 10px;
            z-index: 1000;
            border: 1px solid rgba(109, 79, 199, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9b8ab0;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 15px;
            transition: all 0.3s ease;
            flex: 1;
        }
        .tab:hover { background: rgba(109, 79, 199, 0.1); }
        .tab.active { color: #8a6cff; background: rgba(109, 79, 199, 0.15); }
        .tab i { font-size: 20px; margin-bottom: 4px; }

        /* رأس الصفحة */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(109, 79, 199, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #6d4fc7;
            color: white;
            transform: scale(0.96);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Skeleton Loading */
        .skeleton-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(109,79,199,0.1);
        }
        .skeleton-line {
            height: 24px;
            background: linear-gradient(90deg, #1e1535 25%, #2d224a 50%, #1e1535 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 30px;
            margin: 10px 0;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* بطاقة الاشتراك */
        .subscription-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(109, 79, 199, 0.2);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .subscription-card:hover {
            transform: translateY(-5px);
            border-color: #6d4fc7;
            box-shadow: 0 15px 30px rgba(109, 79, 199, 0.3);
        }
        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 2;
        }
        .status-badge.active { background: #2e8b57; color: white; }
        .status-badge.expired { background: #c44545; color: white; }
        .status-badge.pending { background: #ffb347; color: #1a1330; }
        .package-name {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 15px;
        }
        .package-name i {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ffd700;
        }
        .package-name h2 {
            font-size: 22px;
            font-weight: 900;
            color: white;
        }
        .dates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .date-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .date-label {
            font-size: 12px;
            color: #b1a4c2;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .date-value {
            font-size: 14px;
            font-weight: 700;
            color: white;
        }
        .date-value.expired { color: #ff9b9b; }
        .progress-section {
            margin: 20px 0;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .progress-header span {
            font-size: 13px;
            color: #d0c2e6;
        }
        .progress-percent {
            font-weight: 900;
            color: #ffd700;
        }
        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6d4fc7, #b49aff);
            border-radius: 20px;
            transition: width 0.5s ease;
        }
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            color: white;
            margin-top: 10px;
        }
        .action-btn.expired {
            background: #4a2e3a;
            color: #b1a4c2;
            cursor: not-allowed;
        }
        .action-btn.pending {
            background: #ffb347;
            color: #1a1330;
            cursor: not-allowed;
        }
        .action-btn:active:not(:disabled) { transform: scale(0.98); }

        /* قسم الطلبات المعلقة */
        .pending-section {
            margin-top: 30px;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 179, 71, 0.1);
            padding: 12px 20px;
            border-radius: 40px;
            border-right: 4px solid #ffb347;
        }
        .section-header i { color: #ffb347; font-size: 20px; }
        .section-header h3 { font-size: 18px; font-weight: 700; color: #ffb347; }

        /* حالات فارغة وخطأ */
        .empty-state {
            background: rgba(26,19,48,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 50px 24px;
            text-align: center;
            border: 1px dashed #6d4fc7;
            margin: 30px 0;
        }
        .empty-state i {
            font-size: 64px;
            color: #ffd700;
            opacity: 0.7;
            margin-bottom: 16px;
        }
        .empty-state h3 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .empty-state p { color: #b1a4c2; margin-bottom: 20px; }
        .browse-btn {
            background: #6d4fc7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .error-state {
            background: rgba(196, 69, 69, 0.15);
            border: 1px solid #c44545;
            border-radius: 40px;
            padding: 40px 24px;
            text-align: center;
            margin: 30px 0;
        }
        .error-state i { font-size: 64px; color: #c44545; margin-bottom: 16px; }
        .error-state h3 { font-size: 20px; margin-bottom: 8px; color: #ff9b9b; }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUpToast 0.3s ease;
        }
        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }
        @keyframes slideUpToast {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 100px; opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div id="loadingScreen" class="loading-screen"><div class="loader"></div></div>
    <div id="offlineBanner" class="offline-banner"><i class="fas fa-wifi"></i> لا يوجد اتصال بالإنترنت</div>

    <div class="content" id="mainContent">
        <div class="header">
            <div class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></div>
            <h1><i class="fas fa-crown" style="margin-left: 8px;"></i> اشتراكاتي</h1>
        </div>

        <div id="subscriptionsContainer"></div>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <div class="tab" id="tabHome"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="tab active" id="tabSubs"><i class="fas fa-crown"></i><span>اشتراكاتي</span></div>
            <div class="tab" id="tabTry"><i class="fas fa-code"></i><span>درب نفسك</span></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, doc, getDoc, collection, query, where, 
            getDocs, orderBy, Timestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== عناصر DOM ====================
        const loadingScreen = document.getElementById('loadingScreen');
        const offlineBanner = document.getElementById('offlineBanner');
        const subscriptionsContainer = document.getElementById('subscriptionsContainer');
        const backBtn = document.getElementById('backBtn');
        const tabHome = document.getElementById('tabHome');
        const tabSubs = document.getElementById('tabSubs');
        const tabTry = document.getElementById('tabTry');

        // ==================== متغيرات عامة ====================
        let currentUser = null;
        let userData = null;
        let packagesCache = new Map();

        // ==================== دوال مساعدة ====================
        function showToast(text, isError = false) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-message ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i><span>${text}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function checkOnlineStatus() {
            if (!navigator.onLine) {
                offlineBanner.classList.add('show');
                return false;
            }
            offlineBanner.classList.remove('show');
            return true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ar-EG', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
            } catch (e) {
                return 'غير محدد';
            }
        }

        // ==================== التحقق من انتهاء الاشتراك (باستخدام وقت الخادم) ====================
        function isExpired(expiresAt) {
            if (!expiresAt) return false;
            try {
                const serverTime = Timestamp.now();
                const expiryDate = expiresAt.toDate ? expiresAt.toDate() : new Date(expiresAt);
                return expiryDate < serverTime.toDate();
            } catch (e) {
                return false;
            }
        }

        // ==================== جلب تفاصيل الباقة مع التخزين المؤقت ====================
        async function getPackageDetails(packageId) {
            if (packagesCache.has(packageId)) {
                return packagesCache.get(packageId);
            }
            
            try {
                const pkgRef = doc(db, 'PKG_packages', packageId);
                const pkgSnap = await getDoc(pkgRef);
                if (pkgSnap.exists()) {
                    const pkgData = { id: packageId, ...pkgSnap.data() };
                    packagesCache.set(packageId, pkgData);
                    return pkgData;
                }
                return null;
            } catch (error) {
                console.warn(`⚠️ فشل جلب الباقة ${packageId}:`, error);
                return null;
            }
        }

        // ==================== حساب التقدم في الدورة (من localStorage) ====================
        async function calculateProgress(packageId, userId) {
            try {
                // جلب الدروس المرتبطة بالباقة
                const lessonsRef = collection(db, 'LESS_lessons');
                const q = query(lessonsRef, where('packageId', '==', packageId));
                const lessonsSnap = await getDocs(q);
                const totalLessons = lessonsSnap.size;
                
                if (totalLessons === 0) return 0;
                
                // جلب التقدم من localStorage (حيث يتم تخزينه في platform.html)
                const progressKey = `edu_progress_${userId}`;
                const stored = localStorage.getItem(progressKey);
                let progressData = {};
                if (stored) {
                    try { progressData = JSON.parse(stored); } catch { }
                }
                
                const packageProgress = progressData[packageId] || { completedLessons: [] };
                const completedCount = packageProgress.completedLessons?.length || 0;
                
                return Math.round((completedCount / totalLessons) * 100);
            } catch (error) {
                console.warn(`⚠️ فشل حساب التقدم للباقة ${packageId}:`, error);
                return 0;
            }
        }

        // ==================== جلب الطلبات قيد المراجعة ====================
        async function loadPendingRequests(userId) {
            try {
                const paymentsRef = collection(db, 'PAY_requests');
                const q = query(
                    paymentsRef,
                    where('userId', '==', userId),
                    where('status', '==', 'قيد المراجعة'),
                    orderBy('createdAt', 'desc')
                );
                const querySnapshot = await getDocs(q);
                
                const pendingRequests = [];
                for (const docSnap of querySnapshot.docs) {
                    const request = { id: docSnap.id, ...docSnap.data() };
                    let packageDetails = null;
                    
                    if (request.packageId) {
                        packageDetails = await getPackageDetails(request.packageId);
                    }
                    
                    pendingRequests.push({
                        ...request,
                        packageDetails: packageDetails || { name: request.packageName || 'باقة غير معروفة' }
                    });
                }
                return pendingRequests;
            } catch (error) {
                console.error('خطأ في جلب الطلبات المعلقة:', error);
                return [];
            }
        }

        // ==================== عرض Skeleton ====================
        function showSkeleton() {
            subscriptionsContainer.innerHTML = `
                <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div>
                <div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div>
            `;
        }

        // ==================== عرض الاشتراكات والطلبات ====================
        async function renderSubscriptionsAndRequests() {
            if (!checkOnlineStatus()) {
                subscriptionsContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-wifi"></i>
                        <h3>لا يوجد اتصال بالإنترنت</h3>
                        <button class="browse-btn" onclick="location.reload()"><i class="fas fa-redo-alt"></i> إعادة المحاولة</button>
                    </div>
                `;
                return;
            }
            
            try {
                // جلب بيانات المستخدم من STU_users
                const userRef = doc(db, 'STU_users', currentUser.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    subscriptionsContainer.innerHTML = `
                        <div class="error-state">
                            <i class="fas fa-user-slash"></i>
                            <h3>بيانات المستخدم غير مكتملة</h3>
                            <button class="browse-btn" onclick="window.location.href='index.html'">تسجيل الدخول مرة أخرى</button>
                        </div>
                    `;
                    return;
                }
                
                const userDocData = userSnap.data();
                userData = { uid: currentUser.uid, ...userDocData };
                const activePackages = userDocData.activePackages || {};
                
                // تحديث localStorage للعرض
                localStorage.setItem('edu_user', JSON.stringify({
                    uid: currentUser.uid,
                    name: userDocData.name || 'مستخدم',
                    phone: userDocData.phone || '',
                    lastVerified: Date.now()
                }));
                
                // جلب الطلبات المعلقة
                const pendingRequests = await loadPendingRequests(currentUser.uid);
                
                // تجهيز الاشتراكات النشطة
                const packageIds = Object.keys(activePackages);
                const subscriptions = [];
                
                for (const pkgId of packageIds) {
                    const subInfo = activePackages[pkgId];
                    const pkgDetails = await getPackageDetails(pkgId);
                    if (!pkgDetails) continue;
                    
                    const expired = isExpired(subInfo.expiresAt);
                    const progress = await calculateProgress(pkgId, currentUser.uid);
                    
                    subscriptions.push({
                        id: pkgId,
                        name: pkgDetails.name || 'باقة تدريب',
                        activatedAt: subInfo.activatedAt,
                        expiresAt: subInfo.expiresAt,
                        expired: expired,
                        progress: progress
                    });
                }
                
                // ترتيب الاشتراكات: النشطة أولاً ثم المنتهية
                subscriptions.sort((a, b) => {
                    if (a.expired === b.expired) return 0;
                    return a.expired ? 1 : -1;
                });
                
                // بناء HTML
                let html = '';
                
                // قسم الاشتراكات النشطة والمنتهية
                if (subscriptions.length > 0) {
                    subscriptions.forEach(sub => {
                        const statusClass = sub.expired ? 'expired' : 'active';
                        const statusText = sub.expired ? 'منتهي' : 'نشط';
                        const statusIcon = sub.expired ? 'fa-times-circle' : 'fa-check-circle';
                        const buttonClass = sub.expired ? 'action-btn expired' : 'action-btn';
                        const buttonText = sub.expired ? '📚 عرض المحتوى السابق' : '🚪 الدخول للباقة';
                        const buttonDisabled = sub.expired ? 'disabled' : '';
                        
                        html += `
                            <div class="subscription-card" data-aos="fade-up">
                                <div class="status-badge ${statusClass}">
                                    <i class="fas ${statusIcon}"></i> ${statusText}
                                </div>
                                <div class="package-name">
                                    <i class="fas fa-cubes"></i>
                                    <h2>${escapeHtml(sub.name)}</h2>
                                </div>
                                <div class="dates-grid">
                                    <div class="date-item">
                                        <span class="date-label"><i class="fas fa-play-circle"></i> تاريخ التفعيل</span>
                                        <span class="date-value">${formatDate(sub.activatedAt)}</span>
                                    </div>
                                    <div class="date-item">
                                        <span class="date-label"><i class="fas fa-hourglass-end"></i> تاريخ الانتهاء</span>
                                        <span class="date-value ${sub.expired ? 'expired' : ''}">${formatDate(sub.expiresAt)}</span>
                                    </div>
                                </div>
                                <div class="progress-section">
                                    <div class="progress-header">
                                        <span><i class="fas fa-tasks"></i> التقدم في الدورة</span>
                                        <span class="progress-percent">${sub.progress}%</span>
                                    </div>
                                    <div class="progress-bar-bg">
                                        <div class="progress-fill" style="width: ${sub.progress}%;"></div>
                                    </div>
                                </div>
                                <button class="${buttonClass}" data-package="${sub.id}" ${buttonDisabled}>
                                    <i class="fas ${sub.expired ? 'fa-history' : 'fa-sign-in-alt'}"></i>
                                    ${buttonText}
                                </button>
                            </div>
                        `;
                    });
                }
                
                // قسم الطلبات المعلقة
                if (pendingRequests.length > 0) {
                    html += `
                        <div class="pending-section">
                            <div class="section-header">
                                <i class="fas fa-clock"></i>
                                <h3>⏳ طلبات قيد المراجعة</h3>
                            </div>
                    `;
                    
                    pendingRequests.forEach(req => {
                        const createdAtFormatted = formatDate(req.createdAt);
                        html += `
                            <div class="subscription-card" data-aos="fade-up">
                                <div class="status-badge pending">
                                    <i class="fas fa-clock"></i> قيد المراجعة
                                </div>
                                <div class="package-name">
                                    <i class="fas fa-hourglass-half"></i>
                                    <h2>${escapeHtml(req.packageDetails?.name || req.packageName || 'باقة')}</h2>
                                </div>
                                <div class="dates-grid">
                                    <div class="date-item">
                                        <span class="date-label"><i class="fas fa-calendar-plus"></i> تاريخ الطلب</span>
                                        <span class="date-value">${createdAtFormatted}</span>
                                    </div>
                                    <div class="date-item">
                                        <span class="date-label"><i class="fas fa-info-circle"></i> الحالة</span>
                                        <span class="date-value" style="color: #ffb347;">جاري المراجعة</span>
                                    </div>
                                </div>
                                <button class="action-btn pending" disabled>
                                    <i class="fas fa-spinner fa-pulse"></i> في انتظار التفعيل
                                </button>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                }
                
                // حالة عدم وجود أي اشتراكات أو طلبات
                if (subscriptions.length === 0 && pendingRequests.length === 0) {
                    html = `
                        <div class="empty-state" data-aos="fade-up">
                            <i class="fas fa-crown"></i>
                            <h3>لا توجد اشتراكات نشطة</h3>
                            <p>ابدأ رحلتك التعليمية معنا اليوم!</p>
                            <button class="browse-btn" id="browsePackagesBtn">
                                <i class="fas fa-search"></i> تصفح الباقات
                            </button>
                        </div>
                    `;
                }
                
                subscriptionsContainer.innerHTML = html;
                
                // إضافة مستمعي الأحداث للأزرار
                document.querySelectorAll('.action-btn[data-package]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const packageId = btn.dataset.package;
                        window.location.href = `platform.html?packageId=${packageId}`;
                    });
                });
                
                document.getElementById('browsePackagesBtn')?.addEventListener('click', () => {
                    window.location.href = 'packages.html';
                });
                
                AOS.refresh();
                
            } catch (error) {
                console.error('❌ خطأ في تحميل الاشتراكات:', error);
                subscriptionsContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>حدث خطأ</h3>
                        <p>${escapeHtml(error.message || 'فشل تحميل الاشتراكات')}</p>
                        <button class="browse-btn" onclick="location.reload()"><i class="fas fa-redo-alt"></i> إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        // ==================== التحقق من المستخدم ====================
        async function verifyUser() {
            return new Promise((resolve, reject) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.replace('index.html');
                        reject();
                        return;
                    }
                    
                    try {
                        const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                        if (!userDoc.exists()) {
                            await signOut(auth);
                            window.location.replace('index.html');
                            reject();
                            return;
                        }
                        
                        currentUser = user;
                        userData = { uid: user.uid, ...userDoc.data() };
                        resolve();
                    } catch (error) {
                        console.error('خطأ في جلب بيانات المستخدم:', error);
                        reject(error);
                    }
                });
            });
        }

        // ==================== الدالة الرئيسية ====================
        async function loadSubscriptions() {
            showSkeleton();
            await renderSubscriptionsAndRequests();
        }

        // ==================== أحداث ====================
        backBtn.addEventListener('click', () => window.history.back());
        tabHome.addEventListener('click', () => window.location.href = 'home.html');
        tabSubs.addEventListener('click', () => window.location.reload());
        tabTry.addEventListener('click', () => window.location.href = 'try.html');
        
        // مراقبة حالة الاتصال
        window.addEventListener('online', () => {
            offlineBanner.classList.remove('show');
            showToast('تم استعادة الاتصال بالإنترنت');
            loadSubscriptions();
        });
        window.addEventListener('offline', () => offlineBanner.classList.add('show'));
        
        // ==================== بدء التطبيق ====================
        async function init() {
            AOS.init({ duration: 800, once: true });
            createParticles();
            
            try {
                await verifyUser();
                await loadSubscriptions();
            } catch (error) {
                console.error('فشل التهيئة:', error);
            } finally {
                setTimeout(() => loadingScreen.classList.add('hidden'), 500);
            }
        }
        
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.width = Math.random() * 6 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.background = `rgba(109, 79, 199, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        
        init();
    </script>
</body>
</html>
