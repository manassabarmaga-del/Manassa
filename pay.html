<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اشتراكاتي - منصة البرمجة</title>
    <!-- خط Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f0a1e;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(109, 79, 199, 0.3);
            border-radius: 50%;
            animation: float 8s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }
        }

        /* المحتوى الرئيسي */
        .content {
            padding: 20px 20px 100px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* الهيدر */
        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: #1a1330;
            border: 1px solid #2d224a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b1a4c2;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #6d4fc7;
            color: white;
            border-color: #6d4fc7;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Skeleton Loading */
        .skeleton-wrapper {
            width: 100%;
        }

        .skeleton-card {
            background: #1a1330;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #2d224a;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .skeleton-title {
            width: 60%;
            height: 30px;
            background: #2d224a;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .skeleton-meta {
            width: 40%;
            height: 20px;
            background: #2d224a;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .skeleton-price {
            width: 30%;
            height: 35px;
            background: #2d224a;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        /* بطاقة الاشتراك */
        .subscription-card {
            background: linear-gradient(145deg, #1a1330, #131025);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2d224a;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subscription-card:hover {
            transform: translateY(-5px);
            border-color: #6d4fc7;
            box-shadow: 0 20px 30px rgba(109, 79, 199, 0.2);
        }

        .card-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #2e8b57, #3cb371);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1;
        }

        .card-badge i {
            font-size: 10px;
        }

        .package-name {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .package-name i {
            color: #6d4fc7;
            background: rgba(109, 79, 199, 0.2);
            padding: 8px;
            border-radius: 14px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #0f0a1f;
            border-radius: 20px;
            padding: 15px;
        }

        .date-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .date-label {
            font-size: 12px;
            color: #b1a4c2;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .date-label i {
            color: #6d4fc7;
            font-size: 10px;
        }

        .date-value {
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .date-value.expired {
            color: #ff6b6b;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-title {
            font-size: 13px;
            color: #b1a4c2;
        }

        .progress-percent {
            font-size: 13px;
            font-weight: 700;
            color: #6d4fc7;
        }

        .progress-bar {
            height: 8px;
            background: #0f0a1f;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6d4fc7, #8a6cff);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .enter-btn {
            width: 100%;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(109, 79, 199, 0.4);
        }

        .enter-btn:active {
            transform: translateY(0);
        }

        .enter-btn i {
            font-size: 18px;
        }

        /* Empty state */
        .empty-state {
            background: #1a1330;
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            border: 1px dashed #2d224a;
            margin-top: 30px;
        }

        .empty-state i {
            font-size: 70px;
            color: #2d224a;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        .empty-state p {
            color: #b1a4c2;
            margin-bottom: 25px;
        }

        .browse-btn {
            background: #6d4fc7;
            color: white;
            padding: 14px 30px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .browse-btn:hover {
            background: #8a6cff;
            transform: translateY(-2px);
        }

        /* التابات السفلية */
        .tabs-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 19, 48, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 10px;
            z-index: 1000;
            border: 1px solid rgba(109, 79, 199, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9b8ab0;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 15px;
            transition: all 0.3s ease;
            flex: 1;
            text-decoration: none;
        }

        .tab:hover {
            background: rgba(109, 79, 199, 0.1);
        }

        .tab.active {
            color: #8a6cff;
            background: rgba(109, 79, 199, 0.15);
        }

        .tab i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }

        @keyframes slideUp {
            from {
                bottom: -100px;
                opacity: 0;
            }
            to {
                bottom: 100px;
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        /* شاشة تحميل */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- جزيئات متحركة -->
    <div class="particles" id="particles"></div>

    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Toast Message -->
    <div id="toastMessage" class="toast-message hidden">
        <i class="fas fa-check-circle"></i>
        <span id="toastText"></span>
    </div>

    <div class="content">
        <!-- الهيدر -->
        <div class="page-header">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1>اشتراكاتي</h1>
        </div>

        <!-- Skeleton Loader -->
        <div id="skeletonLoader">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <!-- المحتوى الفعلي -->
        <div id="subscriptionsList" class="hidden"></div>
    </div>

    <!-- التابات السفلية -->
    <div class="tabs-container">
        <div class="tabs">
            <a href="home.html" class="tab">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="pay.html" class="tab active">
                <i class="fas fa-crown"></i>
                <span>اشتراكاتي</span>
            </a>
            <a href="try.html" class="tab">
                <i class="fas fa-code"></i>
                <span>درب نفسك</span>
            </a>
        </div>
    </div>

    <script type="module">
        // إخفاء console.log في الإنتاج
        if (!window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getFirestore, 
            collection,
            doc,
            getDoc,
            getDocs,
            query,
            where,
            orderBy
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر الصفحة
        const loadingScreen = document.getElementById('loadingScreen');
        const skeletonLoader = document.getElementById('skeletonLoader');
        const subscriptionsList = document.getElementById('subscriptionsList');
        const toastMessage = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');
        const particlesContainer = document.getElementById('particles');

        let currentUser = null;
        let allPackagesCache = {};

        // إنشاء جزيئات متحركة
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = `rgba(109, 79, 199, ${Math.random() * 0.5})`;
                particlesContainer.appendChild(particle);
            }
        }

        // عرض Toast
        function showToast(text, isError = false) {
            toastText.textContent = text;
            toastMessage.classList.remove('hidden');
            toastMessage.className = isError ? 'toast-message error' : 'toast-message';
            
            setTimeout(() => {
                toastMessage.classList.add('hidden');
            }, 3000);
        }

        // جلب بيانات الباقة
        async function getPackageDetails(packageId) {
            if (allPackagesCache[packageId]) {
                return allPackagesCache[packageId];
            }
            
            try {
                const packageRef = doc(db, 'PKG_packages', packageId);
                const packageSnap = await getDoc(packageRef);
                
                if (packageSnap.exists()) {
                    allPackagesCache[packageId] = packageSnap.data();
                    return allPackagesCache[packageId];
                }
            } catch (error) {
                console.error('خطأ في جلب الباقة:', error);
            }
            
            return null;
        }

        // حساب عدد الدروس المكتملة
        async function calculateProgress(packageId, lessonsViewed = {}) {
            try {
                const lessonsRef = collection(db, 'LESS_lessons');
                const q = query(lessonsRef, where('packageId', '==', packageId));
                const lessonsSnap = await getDocs(q);
                
                const totalLessons = lessonsSnap.size;
                if (totalLessons === 0) return 0;
                
                const viewedCount = Object.keys(lessonsViewed).length;
                return Math.round((viewedCount / totalLessons) * 100);
            } catch (error) {
                console.error('خطأ في حساب التقدم:', error);
                return 0;
            }
        }

        // تنسيق التاريخ
        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('ar-EG', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } catch (e) {
                return dateString;
            }
        }

        // التحقق من انتهاء الصلاحية
        function isExpired(expiresAt) {
            try {
                const expiryDate = new Date(expiresAt);
                const now = new Date();
                return expiryDate < now;
            } catch (e) {
                return false;
            }
        }

        // تحميل الاشتراكات
        async function loadSubscriptions() {
            try {
                skeletonLoader.classList.remove('hidden');
                subscriptionsList.classList.add('hidden');

                if (!currentUser) {
                    throw new Error('المستخدم غير موجود');
                }

                // جلب بيانات المستخدم مع activePackages
                const userRef = doc(db, 'STU_users', currentUser.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    throw new Error('بيانات المستخدم غير موجودة');
                }

                const userData = userSnap.data();
                const activePackages = userData.activePackages || {};

                if (Object.keys(activePackages).length === 0) {
                    subscriptionsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-crown"></i>
                            <h3>لا توجد اشتراكات نشطة</h3>
                            <p>اشترك في إحدى باقاتنا المميزة وابدأ رحلة التعلم</p>
                            <a href="home.html" class="browse-btn">
                                <i class="fas fa-cubes"></i>
                                تصفح الباقات
                            </a>
                        </div>
                    `;
                    skeletonLoader.classList.add('hidden');
                    subscriptionsList.classList.remove('hidden');
                    return;
                }

                let html = '';
                let hasActive = false;

                // تحميل التقدم المحفوظ من localStorage
                const progressData = JSON.parse(localStorage.getItem(`edu_progress_${currentUser.uid}`) || '{}');

                for (const [packageId, subscription] of Object.entries(activePackages)) {
                    const packageDetails = await getPackageDetails(packageId);
                    if (!packageDetails) continue;

                    const expired = isExpired(subscription.expiresAt);
                    if (!expired) hasActive = true;

                    // حساب التقدم
                    const packageProgress = progressData[packageId] || { viewedLessons: {} };
                    const progressPercent = await calculateProgress(packageId, packageProgress.viewedLessons);

                    html += `
                        <div class="subscription-card" data-aos="fade-up">
                            <div class="card-badge" style="background: ${expired ? '#c44545' : '#2e8b57'}">
                                <i class="fas ${expired ? 'fa-times-circle' : 'fa-check-circle'}"></i>
                                <span>${expired ? 'منتهي' : 'نشط'}</span>
                            </div>
                            
                            <h3 class="package-name">
                                <i class="fas fa-cubes"></i>
                                ${packageDetails.name || 'باقة'}
                            </h3>

                            <div class="dates-grid">
                                <div class="date-item">
                                    <span class="date-label">
                                        <i class="fas fa-calendar-plus"></i>
                                        تاريخ التفعيل
                                    </span>
                                    <span class="date-value">${formatDate(subscription.activatedAt)}</span>
                                </div>
                                <div class="date-item">
                                    <span class="date-label">
                                        <i class="fas fa-calendar-times"></i>
                                        تاريخ الانتهاء
                                    </span>
                                    <span class="date-value ${expired ? 'expired' : ''}">${formatDate(subscription.expiresAt)}</span>
                                </div>
                            </div>

                            <div class="progress-section">
                                <div class="progress-header">
                                    <span class="progress-title">التقدم في الدورة</span>
                                    <span class="progress-percent">${progressPercent}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                                </div>
                            </div>

                            <a href="platform.html?packageId=${packageId}" class="enter-btn">
                                <i class="fas fa-door-open"></i>
                                ${expired ? 'عرض المحتوى السابق' : 'الدخول للباقة'}
                            </a>
                        </div>
                    `;
                }

                if (!hasActive && html) {
                    html += `
                        <div class="empty-state" style="margin-top: 20px;">
                            <i class="fas fa-hourglass-end"></i>
                            <h3>جميع اشتراكاتك منتهية</h3>
                            <p>جدد اشتراكك في إحدى الباقات للاستمرار في التعلم</p>
                            <a href="home.html" class="browse-btn">
                                <i class="fas fa-cubes"></i>
                                تصفح الباقات
                            </a>
                        </div>
                    `;
                }

                subscriptionsList.innerHTML = html;

                // تفعيل AOS
                if (window.AOS) {
                    AOS.refresh();
                }

            } catch (error) {
                console.error('خطأ في تحميل الاشتراكات:', error);
                subscriptionsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #c44545;"></i>
                        <h3>حدث خطأ</h3>
                        <p>${error.message}</p>
                        <button class="browse-btn" onclick="location.reload()">
                            <i class="fas fa-redo-alt"></i>
                            إعادة المحاولة
                        </button>
                    </div>
                `;
            } finally {
                skeletonLoader.classList.add('hidden');
                subscriptionsList.classList.remove('hidden');
                loadingScreen.classList.add('hidden');
            }
        }

        // التحقق من المستخدم
        const checkAuth = () => {
            return new Promise((resolve, reject) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.href = 'index.html';
                        return;
                    }

                    try {
                        const localUser = localStorage.getItem('edu_user');
                        if (localUser) {
                            currentUser = JSON.parse(localUser);
                        } else {
                            const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                            if (userDoc.exists()) {
                                currentUser = {
                                    uid: user.uid,
                                    ...userDoc.data()
                                };
                                localStorage.setItem('edu_user', JSON.stringify(currentUser));
                            }
                        }
                        resolve(currentUser);
                    } catch (error) {
                        console.error('خطأ في التحقق:', error);
                        reject(error);
                    }
                });
            });
        };

        // بدء التطبيق
        const startApp = async () => {
            try {
                createParticles();
                await checkAuth();
                await loadSubscriptions();
                
                if (window.AOS) {
                    AOS.init({ duration: 800, once: true });
                }
            } catch (error) {
                console.error('خطأ في بدء التطبيق:', error);
                loadingScreen.classList.add('hidden');
            }
        };

        window.addEventListener('load', startApp);
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>
