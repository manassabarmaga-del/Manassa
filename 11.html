<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#b48b6f">
    <title>بنك الأسئلة التدريبية | مهندس إسماعيل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #e0c3a5 0%, #f9e0b5 100%);
            font-family: 'Amiri', 'Segoe UI', system-ui, serif;
            padding: 12px;
            color: #2d2a24;
            min-height: 100vh;
        }

        .app-container {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hero-card {
            background: rgba(180, 139, 111, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 16px;
            color: #fef3e2;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .hero-card h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .hero-tag {
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 5px 12px;
            border-radius: 40px;
            margin: 8px 0;
        }

        .highlight {
            background: #f9e0b5;
            color: #b48b6f;
            padding: 4px 12px;
            border-radius: 32px;
            display: inline-block;
            font-size: 13px;
        }

        .info-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .info-links a, .info-links span {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: 12px;
        }

        .quiz-card {
            background: rgba(255, 250, 242, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            border-right: 4px solid #b48b6f;
            padding-right: 12px;
        }

        .q-num {
            background: #b48b6f;
            color: white;
            border-radius: 50px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: #3a2c21;
            line-height: 1.5;
            flex: 1;
        }

        /* تنسيق الكود البرمجي - بدون كسر للأسطر */
        .code-block {
            direction: ltr;
            text-align: left;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            overflow-x: auto;
            white-space: pre;
            word-break: normal;
            word-wrap: normal;
            tab-size: 4;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid #3c3c3c;
        }

        .code-block code {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            padding: 0;
            white-space: pre;
        }

        .inline-code {
            background: #2d2a24;
            color: #f9e0b5;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 6px;
            direction: ltr;
            display: inline-block;
            white-space: nowrap;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0 12px;
        }

        .options.disabled {
            pointer-events: none;
            opacity: 0.9;
        }

        .option-btn {
            background: rgba(242, 229, 214, 0.9);
            border: 1px solid #e0cbb2;
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Amiri', sans-serif;
            font-weight: 500;
            text-align: right;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2c241c;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn .option-label {
            font-weight: bold;
            flex-shrink: 0;
        }

        .option-btn .option-text {
            flex: 1;
            word-break: break-word;
        }

        .option-btn.selected-correct {
            background: #2e7d64 !important;
            border: 2px solid #1e5a48 !important;
            color: white !important;
        }

        .option-btn.selected-wrong {
            background: #c23b22 !important;
            border: 2px solid #9e2e1a !important;
            color: white !important;
        }

        .feedback {
            border-radius: 18px;
            padding: 14px;
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .feedback.correct-feedback {
            background: #1e7b5e;
            color: white;
            border-right: 5px solid #ffd966;
        }

        .feedback.wrong-feedback {
            background: #c23b22;
            color: white;
            border-right: 5px solid #ffb347;
        }

        .footer-badge {
            text-align: center;
            background: rgba(232, 213, 191, 0.9);
            border-radius: 20px;
            padding: 12px;
            font-size: 12px;
            color: #5c4432;
        }

        .code-block::-webkit-scrollbar {
            height: 6px;
        }
        .code-block::-webkit-scrollbar-track {
            background: #2d2a24;
            border-radius: 4px;
        }
        .code-block::-webkit-scrollbar-thumb {
            background: #b48b6f;
            border-radius: 4px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #2d2a24 0%, #1a1815 100%);
            }
            .quiz-card {
                background: rgba(45, 42, 36, 0.95);
            }
            .question-text {
                color: #fef3e2;
            }
            .option-btn {
                background: rgba(242, 229, 214, 0.12);
                border-color: rgba(224, 203, 178, 0.3);
                color: #fef3e2;
            }
            .footer-badge {
                background: rgba(232, 213, 191, 0.2);
                color: #fef3e2;
            }
        }
        
        @media (max-width: 600px) {
            .code-block {
                font-size: 11px;
                padding: 10px;
            }
            .option-btn {
                padding: 10px 14px;
                font-size: 13px;
            }
            .question-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    const questionsData = [
        { text: "ما هو ناتج تنفيذ الكود التالي؟\nlet x = 10;\nlet y = 5;\nconsole.log(x + y);", options: ["105", "15", "x + y", "5"], correct: 1, explanation: "10 + 5 = 15، عملية جمع أرقام عادية." },
        { text: "ما هي القيمة التي ستظهر في النهاية؟\nlet score = 100;\nscore = 150;\nconsole.log(score);", options: ["100", "250", "150", "Error"], correct: 2, explanation: "المتغير score اتغيرت قيمته لـ 150 وطبعت القيمة الجديدة." },
        { text: "حدد الكود الصحيح الذي يقوم بطباعة حاصل ضرب 4 في 3:", options: ["print(4 * 3);", "console.log(4 x 3);", "console.log(4 * 3);", "log.console(12);"], correct: 2, explanation: "في JavaScript بنستخدم console.log وعملية الضرب بعلامة النجمة *." },
        { text: "ما هو ناتج تنفيذ البرنامج التالي؟\nlet a = 10;\nlet b = 2;\nconsole.log(a / b);\nconsole.log(a * b);", options: ["5 ثم 20", "12 ثم 8", "20 ثم 5", "5 ثم 12"], correct: 0, explanation: "القسمة 10/2 = 5 ، الضرب 10*2 = 20." },
        { text: "ما القيمة التي تظهر في الكونسول؟\nconsole.log(10 - 2 * 3);", options: ["24", "4", "8", "6"], correct: 1, explanation: "الأولويات: الضرب أولاً 2*3=6 بعدين 10-6=4." },
        { text: "ماذا سيطبع هذا الكود؟\nlet temperature = 25;\nif (temperature > 30) {\n    console.log(\"Hot\");\n} else {\n    console.log(\"Cool\");\n}", options: ["Hot", "Cool", "25", "لا يطبع شيء"], correct: 1, explanation: "25 مش أكبر من 30، فبيقف في else ويطبع Cool." },
        { text: "حدد المخرجات للبرنامج التالي:\nlet grade = 75;\nif (grade >= 90) {\n    console.log(\"A\");\n} else if (grade >= 70) {\n    console.log(\"B\");\n} else {\n    console.log(\"C\");\n}", options: ["A", "B", "C", "B ثم C"], correct: 1, explanation: "75 أكبر من 70 فبيطبع B." },
        { text: "ما هي الرسالة التي ستظهر؟\nlet time = 20;\nif (time < 12) {\n    console.log(\"Good Morning\");\n} else if (time < 18) {\n    console.log(\"Good Afternoon\");\n} else {\n    console.log(\"Good Evening\");\n}", options: ["Good Morning", "Good Afternoon", "Good Evening", "Error"], correct: 2, explanation: "الساعة 20 > 18 فبيطبع Good Evening." },
        { text: "ماذا ستكون النتيجة؟\nlet age = 20;\nlet hasID = true;\nif (age >= 18 && hasID == true) {\n    console.log(\"Allowed\");\n} else {\n    console.log(\"Not Allowed\");\n}", options: ["Allowed", "Not Allowed", "True", "False"], correct: 0, explanation: "عمره 18 وفيه ID => Allowed." },
        { text: "ما هو ناتج الكود التالي؟\nlet isWeekend = true;\nlet hasWork = false;\nif (isWeekend || hasWork) {\n    console.log(\"Stay Home\");\n} else {\n    console.log(\"Go Out\");\n}", options: ["Go Out", "Stay Home", "Error", "False"], correct: 1, explanation: "true OR false = true => Stay Home." },
        { text: "ما المخرج البرمجي هنا؟\nlet x = 5;\nif (x > 0 && x < 10) {\n    console.log(\"Inside Range\");\n}", options: ["5", "Inside Range", "0", "لا يطبع شيء"], correct: 1, explanation: "5 بين 0 و 10 => Inside Range." },
        { text: "كم مرة ستتكرر كلمة 'Hello'؟\nfor (let i = 0; i < 3; i++) {\n    console.log(\"Hello\");\n}", options: ["مرتين", "3 مرات", "4 مرات", "مرة واحدة"], correct: 1, explanation: "i=0,1,2 => ثلاث مرات." },
        { text: "ما هي الأرقام التي سيتم طباعتها؟\nfor (let i = 1; i <= 3; i++) {\n    console.log(i);\n}", options: ["0, 1, 2", "1, 2, 3", "1, 2", "3, 3, 3"], correct: 1, explanation: "تبدأ من 1 وتنتهي عند 3 => 1 2 3." },
        { text: "ما هو ناتج جمع الأرقام في هذا الكود؟\nlet sum = 0;\nfor (let i = 1; i <= 2; i++) {\n    sum = sum + i;\n}\nconsole.log(sum);", options: ["1", "2", "3", "0"], correct: 2, explanation: "1+2 = 3." },
        { text: "ما هو ناتج الكود التالي؟\nlet x = 10;\nif (x % 2 == 0) {\n    console.log(\"Even\");\n} else {\n    console.log(\"Odd\");\n}", options: ["Odd", "Even", "10", "0"], correct: 1, explanation: "10 يقبل القسمة على 2 => Even." },
        { text: "ماذا يطبع الكود التالي؟\nlet count = 5;\ncount = count + 1;\nif (count > 5) {\n    console.log(\"Larger\");\n}", options: ["5", "6", "Larger", "لا شيء"], correct: 2, explanation: "count = 6 أكبر من 5 => Larger." },
        { text: "ما هي مخرجات هذا التكرار؟\nfor (let i = 5; i > 2; i--) {\n    console.log(i);\n}", options: ["5, 4, 3", "5, 4, 3, 2", "2, 3, 4, 5", "3, 4, 5"], correct: 0, explanation: "i=5,4,3." },
        { text: "حدد البرنامج الذي يطبع 'Success' فقط إذا كانت الدرجة بين 50 و 100:", options: ["if (degree > 50 || degree < 100)", "if (degree >= 50 && degree <= 100) { console.log(\"Success\"); }", "if (degree == 50) { console.log(\"Success\"); }", "for (let i=50; i<=100; i++) { console.log(\"Success\"); }"], correct: 1, explanation: "باستخدام && علشان تكون بين 50 و 100." },
        { text: "ماذا سيحدث عند تنفيذ هذا الكود؟\nlet user = \"Admin\";\nlet pass = \"123\";\nif (user == \"Admin\" && pass == \"000\") {\n    console.log(\"Login\");\n} else {\n    console.log(\"Fail\");\n}", options: ["Login", "Admin", "Fail", "123"], correct: 2, explanation: "user صحيح لكن pass != 000 => Fail." },
        { text: "ما القيمة النهائية لـ i التي يتم طباعتها؟\nlet i = 10;\nfor (let i = 0; i < 5; i++) { }\nconsole.log(i);", options: ["0", "5", "4", "10"], correct: 3, explanation: "i اللي بره الحلقة مستقلة، قيمتها 10." },
        { text: "ما هو ناتج تنفيذ الكود التالي؟\nlet a = 12;\nlet b = 4;\nconsole.log(a / b + 2);", options: ["3", "5", "6", "14"], correct: 1, explanation: "12/4 =3 ، 3+2 = 5." },
        { text: "ما القيمة التي ستظهر في الكونسول؟\nlet x = 5;\nx = x * 2;\nx = x + 3;\nconsole.log(x);", options: ["10", "13", "25", "8"], correct: 1, explanation: "5*2=10 ، 10+3=13." },
        { text: "ما ناتج العملية التالية؟\nconsole.log(10 % 3);", options: ["3", "0.33", "1", "0"], correct: 2, explanation: "باقي قسمة 10 على 3 = 1." },
        { text: "أي كود مما يلي يقوم بطباعة كلمة 'Hello' وبجانبها الرقم 5؟", options: ["console.log(\"Hello\" + 5);", "console.log(\"Hello\" * 5);", "console.log(\"Hello\" - 5);", "console.log(\"Hello\" / 5);"], correct: 0, explanation: "علامة + بتعمل دمج نصي (concatenate)." },
        { text: "ما هو ناتج تنفيذ الكود؟\nlet num = 20;\nconsole.log(num - 5 * 2);", options: ["30", "10", "25", "15"], correct: 1, explanation: "الضرب أولاً 5*2=10 ، 20-10=10." },
        { text: "ماذا سيطبع هذا الكود؟\nlet speed = 70;\nif (speed > 80) {\n    console.log(\"Fast\");\n} else if (speed > 60) {\n    console.log(\"Normal\");\n} else {\n    console.log(\"Slow\");\n}", options: ["Fast", "Normal", "Slow", "70"], correct: 1, explanation: "70 > 60 وليس >80 فيطبع Normal." },
        { text: "ما هي مخرجات البرمجية التالية؟\nlet isRaining = false;\nif (isRaining) {\n    console.log(\"Take an umbrella\");\n} else {\n    console.log(\"Enjoy the sun\");\n}", options: ["Take an umbrella", "Enjoy the sun", "true", "false"], correct: 1, explanation: "isRaining false => else => Enjoy the sun." },
        { text: "ما هو ناتج الكود إذا كانت درجة الطالب 50؟\nlet grade = 50;\nif (grade > 50) {\n    console.log(\"Passed\");\n} else {\n    console.log(\"Failed\");\n}", options: ["Passed", "Failed", "50", "Error"], correct: 1, explanation: "50 مش أكبر من 50 => Failed." },
        { text: "ماذا يطبع الكود التالي؟\nlet x = 10;\nif (x == \"10\") {\n    console.log(\"Equal\");\n} else {\n    console.log(\"Not Equal\");\n}", options: ["Equal", "Not Equal", "10", "Error"], correct: 0, explanation: "== بيساوي القيم مع تحويل النوع، 10 == '10' => Equal." },
        { text: "حدد المخرج الصحيح:\nlet color = \"Blue\";\nif (color == \"Red\") {\n    console.log(\"Stop\");\n} else if (color == \"Green\") {\n    console.log(\"Go\");\n} else {\n    console.log(\"Unknown\");\n}", options: ["Stop", "Go", "Unknown", "Blue"], correct: 2, explanation: "لا أحمر ولا أخضر => Unknown." },
        { text: "ما هو ناتج تنفيذ الكود؟\nlet age = 25;\nlet hasLicense = true;\nif (age >= 18 && hasLicense) {\n    console.log(\"Can Drive\");\n} else {\n    console.log(\"Cannot Drive\");\n}", options: ["Can Drive", "Cannot Drive", "true", "25"], correct: 0, explanation: "عمره فوق 18 ومعاه رخصة => Can Drive." },
        { text: "ماذا سيظهر في الكونسول؟\nlet isWeekend = true;\nlet isHoliday = false;\nif (isWeekend || isHoliday) {\n    console.log(\"Day Off\");\n}", options: ["Day Off", "false", "لا يطبع شيء", "Error"], correct: 0, explanation: "true OR false = true فيطبع Day Off." },
        { text: "ما ناتج العملية المنطقية التالية؟\nlet x = 5;\nconsole.log(!(x > 10));", options: ["true", "false", "5", "-5"], correct: 0, explanation: "x>10 = false، !false = true." },
        { text: "ماذا يطبع الكود؟\nlet score = 85;\nif (score > 80 && score < 90) {\n    console.log(\"Very Good\");\n}", options: ["85", "Very Good", "score", "لا شيء"], correct: 1, explanation: "85 بين 80 و90 => Very Good." },
        { text: "ما هو ناتج تنفيذ الكود؟\nlet a = true;\nlet b = false;\nconsole.log(a && b || a);", options: ["true", "false", "undefined", "null"], correct: 0, explanation: "(true && false) = false , false || true => true." },
        { text: "كم مرة سيتم تنفيذ هذا التكرار؟\nfor (let i = 0; i < 4; i++) {\n    console.log(\"JS\");\n}", options: ["3 مرات", "4 مرات", "5 مرات", "مرة واحدة"], correct: 1, explanation: "i=0,1,2,3 => أربع مرات." },
        { text: "ما هي الأرقام التي ستُطبع؟\nfor (let i = 10; i <= 12; i++) {\n    console.log(i);\n}", options: ["10, 11", "10, 11, 12", "11, 12", "12, 11, 10"], correct: 1, explanation: "من 10 لـ 12 شامل => 10 11 12." },
        { text: "ما هو ناتج الكود التالي؟\nlet total = 0;\nfor (let i = 1; i <= 3; i++) {\n    total = total + i;\n}\nconsole.log(total);", options: ["3", "4", "6", "0"], correct: 2, explanation: "1+2+3 = 6." },
        { text: "ماذا سيطبع الكود؟\nfor (let i = 1; i < 5; i = i + 2) {\n    console.log(i);\n}", options: ["1, 2, 3, 4", "1, 3", "1, 3, 5", "2, 4"], correct: 1, explanation: "i=1 ثم i=3 ثم i=5 يوقف => 1 , 3." },
        { text: "كم مرة ستظهر كلمة 'Wait'؟\nfor (let i = 5; i > 2; i--) {\n    console.log(\"Wait\");\n}", options: ["5 مرات", "مرتين", "3 مرات", "4 مرات"], correct: 2, explanation: "i=5,4,3 => ثلاث مرات." },
        { text: "ما القيمة النهائية لـ count؟\nlet count = 0;\nfor (let i = 0; i < 2; i++) {\n    count++;\n}\nconsole.log(count);", options: ["0", "1", "2", "3"], correct: 2, explanation: "مرتين count++ => 2." },
        { text: "ماذا يطبع الكود التالي؟\nlet x = 10;\nif (x % 2 == 0 && x > 5) {\n    console.log(\"Success\");\n}", options: ["10", "Success", "0", "لا شيء"], correct: 1, explanation: "10 زوجي وأكبر من 5 => Success." },
        { text: "ما هو ناتج العملية؟\nconsole.log(2 ** 3 + 1);", options: ["7", "9", "8", "6"], correct: 1, explanation: "2^3=8, 8+1=9." },
        { text: "ماذا يحدث إذا نفذنا هذا الكود؟\nlet name = \"\";\nif (name) {\n    console.log(\"Hello\");\n} else {\n    console.log(\"Anonymous\");\n}", options: ["Hello", "Anonymous", "\"\"", "Error"], correct: 1, explanation: "السلسلة الفارغة تعتبر falsy => Anonymous." },
        { text: "ما هو ناتج طباعة i بعد انتهاء الحلقة؟\nlet i = 100;\nfor (let i = 0; i < 5; i++) { }\nconsole.log(i);", options: ["0", "5", "100", "4"], correct: 2, explanation: "i البرانية مستقلة => 100." },
        { text: "ماذا يطبع الكود التالي؟\nlet a = 5;\nlet b = \"5\";\nconsole.log(a + b);", options: ["10", "55", "5", "Error"], correct: 1, explanation: "جمع رقم مع نص => دمج => '55'." },
        { text: "ما هي مخرجات الكود؟\nlet x = 10;\nif (x > 5) {\n    x = 20;\n}\nconsole.log(x);", options: ["10", "20", "5", "30"], correct: 1, explanation: "الشرط صحيح فـ x = 20." },
        { text: "كم مرة ستطبع كلمة 'Loop'؟\nfor (let i = 0; i <= 2; i++) {\n    console.log(\"Loop\");\n}", options: ["مرتين", "3 مرات", "مرة واحدة", "0"], correct: 1, explanation: "0,1,2 => 3 مرات." },
        { text: "ما هو ناتج العملية المنطقية؟\nconsole.log(10 > 5 || 5 > 10);", options: ["true", "false", "10", "5"], correct: 0, explanation: "10>5 true => الناتج true." },
        { text: "ماذا يطبع الكود التالي؟\nlet x = 1;\nx += 2;\nconsole.log(x);", options: ["1", "2", "3", "12"], correct: 2, explanation: "x = 1+2 =3." },

    function formatQuestionText(fullText) {
        const lines = fullText.split('\n');
        let result = '';
        let currentCodeLines = [];
        let inCode = false;
        
        for (let line of lines) {
            const trimmed = line.trim();
            const isCodeLine = /[{}();=+\-*/<>!&|]|\b(let|const|var|if|for|while|console\.log|function|return|else)\b/.test(line);
            
            if (isCodeLine && trimmed.length > 0) {
                if (!inCode && currentCodeLines.length > 0) {
                    if (currentCodeLines.length > 0) {
                        result += `<pre class="code-block"><code>${escapeHtml(currentCodeLines.join('\n'))}</code></pre>`;
                        currentCodeLines = [];
                    }
                }
                inCode = true;
                currentCodeLines.push(line);
            } else {
                if (inCode && currentCodeLines.length > 0) {
                    result += `<pre class="code-block"><code>${escapeHtml(currentCodeLines.join('\n'))}</code></pre>`;
                    currentCodeLines = [];
                    inCode = false;
                }
                if (trimmed === '') {
                    result += '<br>';
                } else {
                    let formattedLine = escapeHtml(line);
                    formattedLine = formattedLine.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
                    result += `<div>${formattedLine}</div>`;
                }
            }
        }
        
        if (currentCodeLines.length > 0) {
            result += `<pre class="code-block"><code>${escapeHtml(currentCodeLines.join('\n'))}</code></pre>`;
        }
        
        return result || `<div>${escapeHtml(fullText)}</div>`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

        const container = document.getElementById('questionsContainer');

        questionsData.forEach((q, idx) => {
            const qCard = document.createElement('div');

            qCard.id = `q-${idx}`;

            const formattedQuestion = formatQuestionText(q.text);

            const optionsHtml = q.options.map((opt, optIdx) => {
                const optionLetter = String.fromCharCode(65 + optIdx);
                return `
                    <div class="option-btn" data-qidx="${idx}" data-optidx="${optIdx}">
                        <span class="option-label">${optionLetter}.</span>
                        <span class="option-text">${escapeHtml(opt)}</span>
                    </div>
                `;
            }).join('');

            qCard.innerHTML = `
                <div class="question-header">
                    <div class="q-num">${idx+1}</div>
                    <div class="question-text">${formattedQuestion}</div>
                </div>
                <div class="options" id="options-${idx}">
                    ${optionsHtml}
                </div>
                <div class="feedback" id="feedback-${idx}" style="display: none;"></div>
            `;
            container.appendChild(qCard);
        });

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const qIdx = parseInt(btn.dataset.qidx);
                const selected = parseInt(btn.dataset.optidx);
                const question = questionsData[qIdx];
                const isCorrect = (selected === question.correct);
                const feedbackDiv = document.getElementById(`feedback-${qIdx}`);
                const optionsContainer = document.getElementById(`options-${qIdx}`);
                const allOptions = document.querySelectorAll(`#options-${qIdx} .option-btn`);
                
                if (optionsContainer.classList.contains('disabled')) return;
                optionsContainer.classList.add('disabled');
                
                allOptions.forEach(opt => {
                    opt.classList.remove('selected-correct', 'selected-wrong');
                });
                
                if (isCorrect) {
                    btn.classList.add('selected-correct');
                } else {
                    btn.classList.add('selected-wrong');
                    const correctBtn = allOptions[question.correct];
                    if (correctBtn) correctBtn.classList.add('selected-correct');
                }
                
                const correctAnswerText = question.options[question.correct];

                feedbackDiv.innerHTML = feedbackMsg;

                feedbackDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
                
                setTimeout(() => {
                    document.getElementById(`q-${qIdx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            });
        });
