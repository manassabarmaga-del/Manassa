<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>   </title>
    <!-- Prism.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #ff6b6b 0%, #ff8e8e 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ismail-playground {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.3);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .playground-header {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            padding: 12px 15px;
            text-align: center;
        }

        .playground-header h1 {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .playground-header h1 span {
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.25);
            padding: 3px 10px;
            border-radius: 30px;
            margin-right: 8px;
        }

        .playground-header p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: white;
            border-bottom: 1px solid #ffebee;
        }

        .home-link {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 700;
            color: #ff4757;
            background: #ffebee;
            padding: 4px 15px;
            border-radius: 25px;
        }

        .lang-selector {
            display: flex;
            background: #fff5f5;
            padding: 8px;
            gap: 5px;
            border-bottom: 1px solid #ffcdd2;
        }

        .lang-btn {
            flex: 1;
            padding: 10px 5px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: white;
            color: #ff4757;
            border: 1px solid #ffcdd2;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #ff4757;
            color: white;
            border-color: #ff4757;
            box-shadow: 0 3px 8px rgba(255, 71, 87, 0.3);
        }

        .code-area {
            padding: 12px;
            background: white;
        }

        .code-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #ff4757;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .code-label span:first-child {
            background: #ffebee;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .editor-wrapper {
            background: #1e1e1e;
            border-radius: 20px;
            border: 2px solid #ffcdd2;
            overflow: hidden;
            transition: all 0.3s;
            direction: ltr;
        }

        .editor-wrapper:focus-within {
            border-color: #ff4757;
        }

        .code-editor-container {
            display: flex;
            height: 200px;
            background: #1e1e1e;
            line-height: 1.5;
            font-size: 13px;
            font-family: 'Consolas', 'Courier New', monospace;
            position: relative;
        }

        .line-numbers {
            width: 35px;
            padding: 12px 0;
            background: #252526;
            color: #858585;
            text-align: center;
            border-left: 1px solid #3e3e3e;
            user-select: none;
            overflow: hidden;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre;
            direction: ltr;
        }

        .editor-scroll-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #1e1e1e;
        }

        #codeEditor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 12px;
            border: none;
            outline: none;
            background: transparent;
            color: #d4d4d4; /* النص مرئي */
            caret-color: white;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: hidden;
            z-index: 3;
            direction: ltr; /* النص دائماً من اليسار لليمين */
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 12px;
            background: #1e1e1e;
            pointer-events: none; /* منع التفاعل مع الطبقة */
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            z-index: 2;
            color: #d4d4d4;
            direction: ltr;
        }

        .highlight-layer code {
            background: transparent !important;
            color: #d4d4d4 !important;
        }

        .highlight-layer code * {
            background: transparent !important;
        }

        .smart-hints {
            background: linear-gradient(135deg, #fff5f5, #ffffff);
            border-radius: 15px;
            margin-top: 10px;
            padding: 10px;
            border-right: 3px solid #ff4757;
        }

        .hint-title {
            color: #ff4757;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hint-message {
            color: #2d3436;
            font-size: 0.9rem;
            background: white;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ffcdd2;
            min-height: 50px;
        }

        .action-bar {
            display: flex;
            gap: 8px;
            padding: 0 12px 12px 12px;
            background: white;
        }

        .action-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .run-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 3px 10px rgba(16, 185, 129, 0.3);
        }

        .clear-btn {
            background: #ff4757;
            color: white;
            box-shadow: 0 3px 10px rgba(255, 71, 87, 0.3);
        }

        .save-btn {
            background: #3498db;
            color: white;
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.3);
        }

        .output-area {
            padding: 0 12px 12px 12px;
            background: white;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #ff4757;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .output-header span:first-child {
            background: #ffebee;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .output-box {
            background: #fafafa;
            border-radius: 20px;
            padding: 12px;
            min-height: 100px;
            color: #2d3436;
            font-family: 'Courier New', monospace;
            border: 2px solid #ffcdd2;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            direction: ltr;
            font-size: 13px;
        }

        .result-iframe {
            width: 100%;
            height: 150px;
            border: none;
            border-radius: 12px;
            background: white;
        }

        .playground-footer {
            text-align: center;
            padding: 10px;
            background: #ffebee;
            color: #ff4757;
            font-size: 0.8rem;
            border-top: 1px solid #ffcdd2;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4757;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="ismail-playground">
    <div class="playground-header">
        <h1> <span></span></h1>
        <p>منصة التدريب علي البرمجة</p>
    </div>

    <div class="top-bar">
        <a href="#" class="home-link" onclick="return false;">🏠 عودة</a>
        <div class="user-name"> إسماعيل</div>
    </div>

    <div class="lang-selector" id="langSelector">
        <button class="lang-btn active" data-lang="html">HTML</button>
        <button class="lang-btn" data-lang="css">CSS</button>
        <button class="lang-btn" data-lang="js">JavaScript</button>
    </div>

    <div class="code-area">
        <div class="code-label">
            <span>📝 محرر الأكواد</span>
            <span id="currentLangLabel">HTML</span>
        </div>
        
        <div class="editor-wrapper">
            <div class="code-editor-container">
                <div class="line-numbers" id="lineNumbers">1</div>
                <div class="editor-scroll-container" id="scrollContainer">
                    <textarea id="codeEditor" spellcheck="false" dir="ltr" placeholder="اكتب كودك هنا..."></textarea>
                    <div class="highlight-layer" id="highlightLayer">
                        <code id="highlightContent" class="language-html"></code>
                    </div>
                </div>
            </div>
        </div>

        <div class="smart-hints">
            <div class="hint-title">
                <span>🤖 المساعد الذكي</span>
                <span id="motivationEmoji">💪</span>
            </div>
            <div class="hint-message" id="smartHint">
                👋 ابدأ بكتابة الكود
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="action-btn save-btn" id="saveBtn">💾 حفظ</button>
        <button class="action-btn clear-btn" id="clearBtn">🗑 مسح</button>
        <button class="action-btn run-btn" id="runBtn">▶ تشغيل</button>
    </div>

    <div class="output-area">
        <div class="output-header">
            <span>🖥 النتيجة</span>
            <span id="outputType">HTML Output</span>
        </div>
        <div class="output-box" id="outputBox"></div>
    </div>

    <div class="playground-footer">
        ENG,MR Esmail
    </div>
</div>

<script>
    (function() {
        // العناصر
        const codeEditor = document.getElementById('codeEditor');
        const highlightContent = document.getElementById('highlightContent');
        const highlightLayer = document.getElementById('highlightLayer');
        const scrollContainer = document.getElementById('scrollContainer');
        const lineNumbers = document.getElementById('lineNumbers');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const outputBox = document.getElementById('outputBox');
        const smartHint = document.getElementById('smartHint');
        const motivationEmoji = document.getElementById('motivationEmoji');
        const langBtns = document.querySelectorAll('.lang-btn');
        const currentLangLabel = document.getElementById('currentLangLabel');
        const outputType = document.getElementById('outputType');

        let currentLang = 'html';
        let typingTimer;
        const SAVE_KEY = 'ismail_code_editor';

        // تحديث ترقيم الأسطر
        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n');
            const lineCount = Math.max(1, lines.length);
            let numbers = '';
            for (let i = 1; i <= lineCount; i++) {
                numbers += i + '\n';
            }
            lineNumbers.innerText = numbers;
        }

        // تحديث التلوين
        function updateSyntaxHighlighting() {
            const code = codeEditor.value;
            let lang = 'html';
            
            switch(currentLang) {
                case 'html': lang = 'markup'; break;
                case 'css': lang = 'css'; break;
                case 'js': lang = 'javascript'; break;
            }
            
            highlightContent.className = `language-${lang}`;
            highlightContent.textContent = code;
            
            if (window.Prism) {
                Prism.highlightElement(highlightContent);
            }
            
            updateLineNumbers();
        }

        // مزامنة التمرير
        function syncScroll() {
            if (highlightLayer) {
                highlightLayer.scrollTop = scrollContainer.scrollTop;
                highlightLayer.scrollLeft = scrollContainer.scrollLeft;
            }
        }

        codeEditor.addEventListener('scroll', syncScroll);
        
        scrollContainer.addEventListener('scroll', () => {
            codeEditor.scrollTop = scrollContainer.scrollTop;
            codeEditor.scrollLeft = scrollContainer.scrollLeft;
            if (highlightLayer) {
                highlightLayer.scrollTop = scrollContainer.scrollTop;
                highlightLayer.scrollLeft = scrollContainer.scrollLeft;
            }
        });

        // معالج Tab للإندنت
        function handleTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                
                codeEditor.value = codeEditor.value.substring(0, start) + '  ' + codeEditor.value.substring(end);
                codeEditor.selectionStart = codeEditor.selectionEnd = start + 2;
                
                updateSyntaxHighlighting();
            }
        }

        // تحليل الأكواد
        function analyzeCode() {
            const code = codeEditor.value;
            
            if (!code.trim()) {
                smartHint.innerHTML = '👋 اكتب كوداً...';
                motivationEmoji.innerHTML = '😊';
                return;
            }
            
            let errors = [];
            
            const brackets = {
                '(': (code.match(/\(/g) || []).length,
                ')': (code.match(/\)/g) || []).length,
                '{': (code.match(/{/g) || []).length,
                '}': (code.match(/}/g) || []).length,
                '[': (code.match(/\[/g) || []).length,
                ']': (code.match(/\]/g) || []).length
            };
            
            if (brackets['('] !== brackets[')']) {
                errors.push(`أقواس () غير متطابقة`);
            }
            if (brackets['{'] !== brackets['}']) {
                errors.push(`أقواس {} غير متطابقة`);
            }
            if (brackets['['] !== brackets[']']) {
                errors.push(`أقواس [] غير متطابقة`);
            }
            
            if (errors.length === 0) {
                const msgs = ['🌟 رائع!', '💪 ممتاز!', '🎉 أحسنت!', '✨ استمر!'];
                smartHint.innerHTML = `✅ ${msgs[Math.floor(Math.random() * msgs.length)]}`;
                motivationEmoji.innerHTML = '🌟';
            } else {
                smartHint.innerHTML = `❌ ${errors[0]}`;
                motivationEmoji.innerHTML = '💪';
            }
        }

        // تشغيل الكود - بدون أي نصوص تلقائية
        function runCode() {
            const code = codeEditor.value;
            
            // مسح محتوى النتيجة السابقة
            outputBox.innerHTML = '';
            
            try {
                if (currentLang === 'html') {
                    const iframe = document.createElement('iframe');
                    iframe.className = 'result-iframe';
                    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals';
                    
                    outputBox.appendChild(iframe);
                    
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(code || '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body></body></html>');
                    iframeDoc.close();
                    
                    outputType.innerText = 'HTML Output';
                }
                else if (currentLang === 'css') {
                    const iframe = document.createElement('iframe');
                    iframe.className = 'result-iframe';
                    iframe.sandbox = 'allow-same-origin allow-scripts';
                    
                    outputBox.appendChild(iframe);
                    
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(`
                        <!DOCTYPE html>
                        <html dir="rtl">
                        <head>
                            <meta charset="UTF-8">
                            <style>${code || ''}</style>
                        </head>
                        <body>
                            <!-- صفحة فارغة - اكتب HTML في قسم HTML لتجربة CSS -->
                            <div style="padding:20px; color:#666; text-align:center;">
                                اكتب HTML في قسم HTML أولاً
                            </div>
                        </body>
                        </html>
                    `);
                    iframeDoc.close();
                    
                    outputType.innerText = 'CSS Output';
                }
                else if (currentLang === 'js') {
                    // استخدام Blob URL لتجنب مشاكل Sandbox
                    const htmlContent = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <style>
                                body { 
                                    font-family: monospace; 
                                    padding: 10px; 
                                    background: white;
                                    margin: 0;
                                }
                                #console-output {
                                    color: #333;
                                }
                                .console-line {
                                    padding: 2px 0;
                                    border-bottom: 1px solid #eee;
                                }
                            </style>
                        </head>
                        <body>
                            <div id="console-output"></div>
                            <script>
                                // حفظ المرجع للـ console الأصلي
                                const originalConsole = console.log;
                                const output = document.getElementById('console-output');
                                
                                // تخصيص console.log
                                console.log = function(...args) {
                                    const line = document.createElement('div');
                                    line.className = 'console-line';
                                    line.textContent = args.map(arg => 
                                        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                                    ).join(' ');
                                    output.appendChild(line);
                                    
                                    // استدعاء الـ console الأصلي
                                    originalConsole.apply(console, args);
                                };
                                
                                // تنفيذ كود المستخدم
                                try {
                                    ${code || ''}
                                } catch (e) {
                                    const errorLine = document.createElement('div');
                                    errorLine.style.color = 'red';
                                    errorLine.style.fontWeight = 'bold';
                                    errorLine.textContent = '❌ خطأ: ' + e.message;
                                    output.appendChild(errorLine);
                                }
                            <\/script>
                        </body>
                        </html>
                    `;
                    
                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    
                    const iframe = document.createElement('iframe');
                    iframe.className = 'result-iframe';
                    iframe.src = url;
                    iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-modals';
                    
                    outputBox.appendChild(iframe);
                    
                    // تنظيف الـ URL بعد التحميل
                    iframe.onload = () => URL.revokeObjectURL(url);
                    
                    outputType.innerText = 'JS Output';
                }
            } catch(e) {
                outputBox.innerHTML = `<div style="color:red; padding:10px;">❌ خطأ: ${e.message}</div>`;
            }
        }

        // حفظ الكود
        function saveCode() {
            localStorage.setItem(SAVE_KEY + '_' + currentLang, codeEditor.value);
            smartHint.innerHTML = '✅ تم الحفظ';
            setTimeout(analyzeCode, 1500);
        }

        // مسح الكود
        function clearCode() {
            if (confirm('مسح الكود؟')) {
                codeEditor.value = '';
                updateSyntaxHighlighting();
                analyzeCode();
                outputBox.innerHTML = '';
                // مسح التخزين المحلي لهذه اللغة
                localStorage.removeItem(SAVE_KEY + '_' + currentLang);
            }
        }

        // تبديل اللغة - بدون أي نصوص تلقائية
        function switchLanguage(lang) {
            currentLang = lang;
            
            langBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            currentLangLabel.innerText = { html: 'HTML', css: 'CSS', js: 'JavaScript' }[lang];
            
            // محرر فارغ تماماً - لا توجد أمثلة تلقائية
            const saved = localStorage.getItem(SAVE_KEY + '_' + lang);
            codeEditor.value = saved || ''; // فارغ تماماً إذا لم يكن هناك حفظ
            
            updateSyntaxHighlighting();
            analyzeCode();
            outputBox.innerHTML = ''; // مسح النتيجة السابقة
        }

        // الأحداث
        codeEditor.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                updateSyntaxHighlighting();
                analyzeCode();
                localStorage.setItem(SAVE_KEY + '_' + currentLang, codeEditor.value);
            }, 150);
        });

        codeEditor.addEventListener('keydown', (e) => {
            handleTab(e);
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });

        langBtns.forEach(btn => {
            btn.addEventListener('click', () => switchLanguage(btn.dataset.lang));
        });

        runBtn.addEventListener('click', runCode);
        clearBtn.addEventListener('click', clearCode);
        saveBtn.addEventListener('click', saveCode);

        // تهيئة - محرر فارغ تماماً
        codeEditor.value = '';
        updateSyntaxHighlighting();
        
        // منع القائمة اليمنى في المحرر
        codeEditor.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // التركيز التلقائي على المحرر
        codeEditor.focus();
    })();
</script>
</body>
</html>
