<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إتمام الدفع - منصة البرمجة</title>
    <!-- خط Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f0a1f;
            color: #ffffff;
            min-height: 100vh;
            direction: rtl;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        /* البطاقة الرئيسية */
        .payment-card {
            background: #1a1330;
            border-radius: 40px;
            padding: 30px 24px;
            border: 1px solid #2d224a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #6d4fc7, #b49aff);
        }

        /* الهيدر */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: #0f0a1f;
            border: 1px solid #2d224a;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b1a4c2;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #6d4fc7;
            color: white;
            border-color: #6d4fc7;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 900;
            color: white;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 13px;
            color: #b1a4c2;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f0a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Skeleton Loading */
        .skeleton-package {
            background: #1a1330;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-package::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .skeleton-line {
            height: 30px;
            width: 60%;
            background: #2d224a;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .skeleton-price {
            height: 50px;
            width: 40%;
            background: #2d224a;
            border-radius: 25px;
        }

        /* تفاصيل الباقة */
        .package-details {
            background: #0f0a1f;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2d224a;
            transition: all 0.3s;
        }

        .package-details:hover {
            border-color: #6d4fc7;
        }

        .package-name {
            font-size: 22px;
            font-weight: 900;
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .package-name i {
            color: #6d4fc7;
            font-size: 20px;
            background: rgba(109, 79, 199, 0.2);
            padding: 8px;
            border-radius: 14px;
        }

        .package-price-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #2d224a;
        }

        .price-label {
            color: #b1a4c2;
            font-size: 15px;
        }

        .price-value {
            font-size: 32px;
            font-weight: 900;
            color: #b49aff;
        }

        .price-value small {
            font-size: 14px;
            font-weight: 500;
            color: #8f7da8;
            margin-right: 4px;
        }

        .package-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #b1a4c2;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .package-meta i {
            color: #6d4fc7;
            margin-left: 5px;
        }

        /* رقم الدفع */
        .payment-number {
            background: linear-gradient(145deg, #2d1f47, #1a1330);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid #6d4fc7;
            transition: all 0.3s;
        }

        .payment-number:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.2);
        }

        .payment-number-label {
            font-size: 14px;
            color: #b1a4c2;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .number-box {
            background: #0f0a1f;
            padding: 16px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 900;
            color: #b49aff;
            letter-spacing: 2px;
            border: 1px solid #6d4fc7;
            margin-bottom: 12px;
            direction: ltr;
            font-family: monospace;
        }

        .copy-btn {
            background: #6d4fc7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        .copy-btn.copied {
            background: #2e8b57;
        }

        /* تعليمات الدفع */
        .instructions {
            background: #0f0a1f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2d224a;
        }

        .instructions-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b49aff;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #d0c2e6;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .instruction-item:hover {
            background: rgba(109, 79, 199, 0.1);
        }

        .instruction-item i {
            width: 24px;
            height: 24px;
            background: rgba(109, 79, 199, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6d4fc7;
            font-size: 12px;
        }

        /* زر أنا دفعت */
        .paid-btn {
            width: 100%;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .paid-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .paid-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .paid-btn:active {
            transform: scale(0.97);
        }

        .paid-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .paid-btn:disabled::before {
            display: none;
        }

        /* رسالة الانتظار */
        .waiting-message {
            background: #1b2a3b;
            border: 1px solid #2d4f6a;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .waiting-message i {
            font-size: 50px;
            color: #6d4fc7;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .waiting-message h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: white;
        }

        .waiting-message p {
            color: #b1a4c2;
            font-size: 14px;
            line-height: 1.6;
        }

        /* رسائل الخطأ */
        .error-box {
            background: #2d1f3a;
            border: 1px solid #c44545;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            margin: 20px 0;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-box i {
            font-size: 50px;
            color: #c44545;
            margin-bottom: 15px;
        }

        .error-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #ff9b9b;
        }

        .error-box p {
            color: #b1a4c2;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: #6d4fc7;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.3);
        }

        /* رسالة نجاح */
        .success-message {
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideUp {
            from {
                bottom: -100px;
                opacity: 0;
            }
            to {
                bottom: 20px;
                opacity: 1;
            }
        }

        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }

        /* مؤشر التحميل داخل الزر */
        .btn-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-spinner"></div>
    </div>

    <!-- Toast Message -->
    <div id="toastMessage" class="toast-message hidden">
        <i class="fas fa-check-circle"></i>
        <span id="toastText"></span>
    </div>

    <div class="container">
        <div class="payment-card">
            <!-- الهيدر مع زر الرجوع -->
            <div class="header">
                <a href="home.html" class="back-btn" id="backBtn">
                    <i class="fas fa-arrow-right"></i>
                </a>
                <div class="header-title">
                    <h1>إتمام الدفع</h1>
                    <p>خطوة واحدة وتشترك في الباقة</p>
                </div>
            </div>

            <!-- Skeleton Loader -->
            <div id="skeletonLoader">
                <div class="skeleton-package">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-price"></div>
                </div>
                <div class="skeleton-package">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line" style="width: 80%;"></div>
                </div>
            </div>

            <!-- المحتوى الفعلي -->
            <div id="paymentContent" class="hidden"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            getDoc, 
            addDoc, 
            query, 
            where, 
            getDocs, 
            serverTimestamp,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

        // ==================== تهيئة Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== عناصر الصفحة ====================
        const loadingScreen = document.getElementById('loadingScreen');
        const paymentContent = document.getElementById('paymentContent');
        const skeletonLoader = document.getElementById('skeletonLoader');
        const toastMessage = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');

        // ==================== متغيرات عامة ====================
        let currentUser = null;
        let isProcessing = false; // لمنع العمليات المتكررة

        // ==================== التحقق من المستخدم ====================
        const checkAuth = () => {
            return new Promise((resolve, reject) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.href = 'index.html';
                        return;
                    }

                    try {
                        // جلب بيانات المستخدم من localStorage أولاً (سرعة)
                        const localUser = localStorage.getItem('edu_user');
                        if (localUser) {
                            const parsed = JSON.parse(localUser);
                            currentUser = parsed;
                        }

                        // تحديث من Firestore
                        const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                        if (userDoc.exists()) {
                            currentUser = {
                                uid: user.uid,
                                ...userDoc.data()
                            };
                            resolve(currentUser);
                        } else {
                            window.location.href = 'index.html';
                        }
                    } catch (error) {
                        console.error('خطأ في جلب بيانات المستخدم:', error);
                        reject(error);
                    }
                });
            });
        };

        // ==================== دوال مساعدة ====================
        
        // عرض رسالة Toast
        function showToast(text, isError = false) {
            toastText.textContent = text;
            toastMessage.classList.remove('hidden');
            toastMessage.className = isError ? 'toast-message error' : 'toast-message';
            
            setTimeout(() => {
                toastMessage.classList.add('hidden');
            }, 3000);
        }

        // جلب packageId من الرابط
        function getPackageIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('packageId');
        }

        // جلب رقم المحفظة من الإعدادات
        async function getWalletNumber() {
            try {
                const settingsRef = collection(db, 'ADMIN_settings');
                const q = query(settingsRef, where('key', '==', 'walletNumber'));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    return querySnapshot.docs[0].data().value;
                }
                
                // رقم افتراضي إذا لم يتم تعيينه
                return "01000000000";
            } catch (error) {
                console.error('خطأ في جلب رقم المحفظة:', error);
                return "01000000000";
            }
        }

        // التحقق من وجود طلب قيد المراجعة
        async function hasPendingRequest(packageId, userPhone) {
            try {
                const paymentsRef = collection(db, 'PAY_requests');
                const q = query(
                    paymentsRef,
                    where('packageId', '==', packageId),
                    where('userPhone', '==', userPhone),
                    where('status', '==', 'قيد المراجعة')
                );
                const querySnapshot = await getDocs(q);
                
                return !querySnapshot.empty;
            } catch (error) {
                console.error('خطأ في التحقق من الطلبات المعلقة:', error);
                return false;
            }
        }

        // التحقق من اشتراك مفعل
        async function hasActiveSubscription(packageId, userPhone) {
            try {
                const paymentsRef = collection(db, 'PAY_requests');
                const q = query(
                    paymentsRef,
                    where('packageId', '==', packageId),
                    where('userPhone', '==', userPhone),
                    where('status', '==', 'مفعل')
                );
                const querySnapshot = await getDocs(q);
                
                return !querySnapshot.empty;
            } catch (error) {
                console.error('خطأ في التحقق من الاشتراك:', error);
                return false;
            }
        }

        // ==================== تحميل الصفحة الرئيسية ====================
        async function loadPaymentPage() {
            try {
                // إظهار skeleton loader
                skeletonLoader.classList.remove('hidden');
                paymentContent.classList.add('hidden');

                // التحقق من المستخدم
                await checkAuth();
                
                if (!currentUser) {
                    throw new Error('المستخدم غير موجود');
                }

                // جلب packageId من الرابط
                const packageId = getPackageIdFromUrl();
                
                if (!packageId) {
                    throw new Error('لم يتم تحديد الباقة');
                }

                // جلب بيانات الباقة من Firestore
                const packageRef = doc(db, 'PKG_packages', packageId);
                const packageSnap = await getDoc(packageRef);
                
                if (!packageSnap.exists()) {
                    throw new Error('الباقة غير موجودة');
                }

                const packageData = packageSnap.data();

                // التحقق من وجود اشتراك مفعل
                const isActive = await hasActiveSubscription(packageId, currentUser.phone);
                
                if (isActive) {
                    // عرض رسالة أن الباقة مفعلة
                    paymentContent.innerHTML = `
                        <div class="success-message">
                            <i class="fas fa-check-circle"></i>
                            <span>هذه الباقة مفعلة بالفعل!</span>
                        </div>
                        <a href="pay.html" class="paid-btn" style="text-decoration: none;">
                            <i class="fas fa-crown"></i>
                            الذهاب لاشتراكاتي
                        </a>
                    `;
                    
                    skeletonLoader.classList.add('hidden');
                    paymentContent.classList.remove('hidden');
                    loadingScreen.classList.add('hidden');
                    return;
                }

                // التحقق من وجود طلب قيد المراجعة
                const hasPending = await hasPendingRequest(packageId, currentUser.phone);
                
                if (hasPending) {
                    // عرض رسالة أن الطلب قيد المراجعة
                    paymentContent.innerHTML = `
                        <div class="waiting-message">
                            <i class="fas fa-clock"></i>
                            <h3>طلبك قيد المراجعة</h3>
                            <p>لقد أرسلت طلباً لهذه الباقة مسبقاً وهو قيد المراجعة من الإدارة.</p>
                            <p style="margin-top: 15px; font-size: 12px;">سيصلك إشعار عند التفعيل</p>
                            <a href="home.html" class="retry-btn" style="margin-top: 20px; text-decoration: none;">
                                <i class="fas fa-home"></i>
                                العودة للرئيسية
                            </a>
                        </div>
                    `;
                    
                    skeletonLoader.classList.add('hidden');
                    paymentContent.classList.remove('hidden');
                    loadingScreen.classList.add('hidden');
                    return;
                }

                // جلب رقم المحفظة
                const walletNumber = await getWalletNumber();

                // عرض صفحة الدفع
                paymentContent.innerHTML = `
                    <!-- تفاصيل الباقة -->
                    <div class="package-details">
                        <div class="package-name">
                            <i class="fas fa-crown"></i>
                            <span>${packageData.name || 'باقة غير مسماة'}</span>
                        </div>
                        <div class="package-price-row">
                            <span class="price-label">السعر:</span>
                            <span class="price-value">
                                ${packageData.price || 0} <small>جنيه</small>
                            </span>
                        </div>
                        <div class="package-meta">
                            <span><i class="fas fa-clock"></i> ${packageData.duration || 'شهر'}</span>
                            <span><i class="fas fa-calendar"></i> تبدأ: ${packageData.startDate || 'غير محدد'}</span>
                        </div>
                    </div>

                    <!-- رقم الدفع -->
                    <div class="payment-number">
                        <div class="payment-number-label">
                            <i class="fas fa-mobile-alt"></i>
                            <span>رقم محفظة اتصالات كاش</span>
                        </div>
                        <div class="number-box" id="walletNumber">${walletNumber}</div>
                        <button class="copy-btn" id="copyBtn">
                            <i class="fas fa-copy"></i>
                            نسخ الرقم
                        </button>
                    </div>

                    <!-- تعليمات الدفع -->
                    <div class="instructions">
                        <div class="instructions-title">
                            <i class="fas fa-info-circle"></i>
                            <span>طريقة الدفع</span>
                        </div>
                        <div class="instruction-item">
                            <i class="fas fa-1"></i>
                            <span>افتح محفظة اتصالات كاش على هاتفك</span>
                        </div>
                        <div class="instruction-item">
                            <i class="fas fa-2"></i>
                            <span>حول المبلغ المطلوب (${packageData.price || 0} جنيه) للرقم أعلاه</span>
                        </div>
                        <div class="instruction-item">
                            <i class="fas fa-3"></i>
                            <span>اضغط على زر "أنا دفعت" أدناه</span>
                        </div>
                        <div class="instruction-item">
                            <i class="fas fa-4"></i>
                            <span>انتظر لحين تأكيد الدفع من الإدارة (سيتم التفعيل خلال 24 ساعة)</span>
                        </div>
                    </div>

                    <!-- زر أنا دفعت -->
                    <button class="paid-btn" id="paidBtn">
                        <i class="fas fa-check-circle"></i>
                        أنا دفعت
                    </button>

                    <!-- رسالة الانتظار (مخفية ابتدائياً) -->
                    <div id="waitingMessage" class="waiting-message hidden">
                        <i class="fas fa-clock"></i>
                        <h3>تم إرسال طلب الدفع</h3>
                        <p>جاري مراجعة الدفع من الإدارة. سيتم تفعيل الباقة فور التأكيد.</p>
                        <p style="margin-top: 10px; font-size: 12px;">سيصلك إشعار عند التفعيل</p>
                    </div>
                `;

                // إخفاء skeleton وإظهار المحتوى
                skeletonLoader.classList.add('hidden');
                paymentContent.classList.remove('hidden');

                // ===== إضافة وظيفة نسخ الرقم =====
                document.getElementById('copyBtn').addEventListener('click', async () => {
                    const walletNumber = document.getElementById('walletNumber').textContent;
                    try {
                        await navigator.clipboard.writeText(walletNumber);
                        
                        const copyBtn = document.getElementById('copyBtn');
                        const originalHTML = copyBtn.innerHTML;
                        
                        copyBtn.classList.add('copied');
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
                        
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.innerHTML = originalHTML;
                        }, 2000);
                        
                        showToast('تم نسخ الرقم بنجاح');
                    } catch (err) {
                        showToast('فشل في نسخ الرقم', true);
                    }
                });

                // ===== إضافة وظيفة زر "أنا دفعت" مع منع التكرار =====
                document.getElementById('paidBtn').addEventListener('click', async (e) => {
                    e.preventDefault();
                    
                    // منع العمليات المتكررة
                    if (isProcessing) {
                        showToast('يوجد طلب قيد الإرسال', true);
                        return;
                    }

                    const paidBtn = document.getElementById('paidBtn');
                    const waitingMessage = document.getElementById('waitingMessage');
                    
                    // تعطيل الزر
                    isProcessing = true;
                    paidBtn.disabled = true;
                    paidBtn.innerHTML = '<span class="btn-spinner"></span> جاري الإرسال...';
                    
                    try {
                        // التحقق مرة أخرى من عدم وجود طلب معلق
                        const stillPending = await hasPendingRequest(packageId, currentUser.phone);
                        if (stillPending) {
                            showToast('لديك طلب قيد المراجعة بالفعل', true);
                            paidBtn.disabled = false;
                            paidBtn.innerHTML = '<i class="fas fa-check-circle"></i> أنا دفعت';
                            isProcessing = false;
                            return;
                        }

                        // حفظ طلب الدفع في Firebase مع نسخة ثابتة من البيانات
                        const paymentsRef = collection(db, 'PAY_requests');
                        await addDoc(paymentsRef, {
                            // بيانات المستخدم
                            userId: currentUser.uid,
                            userPhone: currentUser.phone,
                            userName: currentUser.name || 'غير معروف',
                            
                            // بيانات الباقة (نسخة ثابتة)
                            packageId: packageId,
                            packageName: packageData.name,
                            packagePrice: packageData.price,
                            packageDuration: packageData.duration,
                            
                            // بيانات الدفع
                            status: 'قيد المراجعة',
                            createdAt: serverTimestamp(), // وقت السيرفر
                            walletNumber: walletNumber,
                            
                            // بيانات إضافية
                            source: 'web',
                            notes: ''
                        });

                        // إخفاء الزر وإظهار رسالة الانتظار
                        paidBtn.classList.add('hidden');
                        waitingMessage.classList.remove('hidden');
                        
                        showToast('تم إرسال طلب الدفع بنجاح');

                    } catch (error) {
                        console.error('خطأ في إرسال طلب الدفع:', error);
                        
                        // إعادة تمكين الزر
                        paidBtn.disabled = false;
                        paidBtn.innerHTML = '<i class="fas fa-check-circle"></i> أنا دفعت';
                        
                        showToast('حدث خطأ في إرسال الطلب', true);
                    } finally {
                        isProcessing = false;
                    }
                });

            } catch (error) {
                console.error('خطأ في تحميل الصفحة:', error);
                
                // عرض رسالة خطأ
                paymentContent.innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>حدث خطأ</h3>
                        <p>${error.message || 'يرجى المحاولة مرة أخرى'}</p>
                        <button class="retry-btn" onclick="location.reload()">
                            <i class="fas fa-redo-alt"></i> إعادة المحاولة
                        </button>
                        <a href="home.html" class="retry-btn" style="margin-right: 10px; text-decoration: none;">
                            <i class="fas fa-home"></i> الرئيسية
                        </a>
                    </div>
                `;
                
                skeletonLoader.classList.add('hidden');
                paymentContent.classList.remove('hidden');
            } finally {
                loadingScreen.classList.add('hidden');
            }
        }

        // ==================== بدء التطبيق ====================
        const startApp = async () => {
            try {
                await loadPaymentPage();
            } catch (error) {
                console.error('خطأ في بدء التطبيق:', error);
                loadingScreen.classList.add('hidden');
                
                paymentContent.innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>خطأ في تحميل الصفحة</h3>
                        <p>${error.message}</p>
                        <button class="retry-btn" onclick="location.reload()">
                            إعادة المحاولة
                        </button>
                    </div>
                `;
                paymentContent.classList.remove('hidden');
                skeletonLoader.classList.add('hidden');
            }
        };

        startApp();

    </script>
</body>
</html>
