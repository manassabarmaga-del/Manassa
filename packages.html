<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جميع الباقات - منصة البرمجة</title>
    <!-- خطوط ومكتبات (نفس الـ head السابق) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* نفس التنسيقات الأساسية من pay.html مع إضافة Grid للباقات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f0a1e;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(109, 79, 199, 0.3);
            border-radius: 50%;
            animation: float 8s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }
        }

        .content {
            padding: 20px 20px 100px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: #1a1330;
            border: 1px solid #2d224a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b1a4c2;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #6d4fc7;
            color: white;
            border-color: #6d4fc7;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Skeleton Loading للباقات */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .skeleton-package {
            height: 400px;
            background: #1a1330;
            border-radius: 32px;
            border: 1px solid #2d224a;
            position: relative;
            overflow: hidden;
        }

        .skeleton-package::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* شبكة الباقات */
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .package-card {
            background: linear-gradient(145deg, #1a1330, #131025);
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid #2d224a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .package-card:hover {
            transform: translateY(-10px);
            border-color: #6d4fc7;
            box-shadow: 0 30px 50px rgba(109, 79, 199, 0.3);
        }

        .package-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            opacity: 0.1;
            border-radius: 32px 32px 50% 50%;
        }

        .package-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(109, 79, 199, 0.4);
        }

        .package-name {
            font-size: 24px;
            font-weight: 900;
            margin: 30px 0 15px;
            color: white;
        }

        .package-price {
            font-size: 36px;
            font-weight: 900;
            color: #8a6cff;
            margin-bottom: 20px;
        }

        .package-price small {
            font-size: 14px;
            color: #b1a4c2;
            font-weight: 500;
        }

        .package-features {
            margin: 20px 0;
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #d0c2e6;
            font-size: 14px;
        }

        .feature-item i {
            color: #2ecc71;
            font-size: 16px;
        }

        .package-date {
            font-size: 13px;
            color: #9b8ab0;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .package-date i {
            color: #6d4fc7;
        }

        .subscribe-btn {
            width: 100%;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.3);
            text-decoration: none;
            margin-top: 10px;
        }

        .subscribe-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(109, 79, 199, 0.5);
        }

        .subscribe-btn:active {
            transform: translateY(0);
        }

        .subscribe-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #4a3b62;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            background: #1a1330;
            border-radius: 32px;
            padding: 60px;
            text-align: center;
            border: 1px dashed #2d224a;
        }

        /* التابات السفلية (نفس pay.html) */
        .tabs-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 19, 48, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 10px;
            z-index: 1000;
            border: 1px solid rgba(109, 79, 199, 0.3);
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9b8ab0;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 15px;
            transition: all 0.3s ease;
            flex: 1;
            text-decoration: none;
        }

        .tab:hover {
            background: rgba(109, 79, 199, 0.1);
        }

        .tab.active {
            color: #8a6cff;
            background: rgba(109, 79, 199, 0.15);
        }

        .tab i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .hidden { display: none !important; }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }

        @keyframes slideUp {
            from {
                bottom: -100px;
                opacity: 0;
            }
            to {
                bottom: 100px;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات متحركة -->
    <div class="particles" id="particles"></div>

    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Toast Message -->
    <div id="toastMessage" class="toast-message hidden">
        <i class="fas fa-check-circle"></i>
        <span id="toastText"></span>
    </div>

    <div class="content">
        <!-- الهيدر -->
        <div class="page-header">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1>جميع الباقات</h1>
        </div>

        <!-- Skeleton Loader -->
        <div id="skeletonLoader" class="skeleton-grid">
            <div class="skeleton-package"></div>
            <div class="skeleton-package"></div>
            <div class="skeleton-package"></div>
            <div class="skeleton-package"></div>
        </div>

        <!-- شبكة الباقات -->
        <div id="packagesGrid" class="packages-grid hidden"></div>
    </div>

    <!-- التابات السفلية -->
    <div class="tabs-container">
        <div class="tabs">
            <a href="home.html" class="tab">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="pay.html" class="tab">
                <i class="fas fa-crown"></i>
                <span>اشتراكاتي</span>
            </a>
            <a href="try.html" class="tab">
                <i class="fas fa-code"></i>
                <span>درب نفسك</span>
            </a>
        </div>
    </div>

    <script type="module">
        // إخفاء console.log في الإنتاج
        if (!window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            query, 
            orderBy,
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر الصفحة
        const loadingScreen = document.getElementById('loadingScreen');
        const skeletonLoader = document.getElementById('skeletonLoader');
        const packagesGrid = document.getElementById('packagesGrid');
        const toastMessage = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');
        const particlesContainer = document.getElementById('particles');

        let currentUser = null;

        // إنشاء جزيئات متحركة
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = `rgba(109, 79, 199, ${Math.random() * 0.5})`;
                particlesContainer.appendChild(particle);
            }
        }

        function showToast(text, isError = false) {
            toastText.textContent = text;
            toastMessage.classList.remove('hidden');
            toastMessage.className = isError ? 'toast-message error' : 'toast-message';
            setTimeout(() => toastMessage.classList.add('hidden'), 3000);
        }

        // التحقق من اشتراك المستخدم في باقة معينة
        async function checkUserSubscription(packageId) {
            if (!currentUser) return false;
            
            try {
                const userRef = doc(db, 'STU_users', currentUser.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const activePackages = userSnap.data().activePackages || {};
                    return !!activePackages[packageId];
                }
            } catch (error) {
                console.error('خطأ في التحقق من الاشتراك:', error);
            }
            return false;
        }

        // تحميل الباقات
        async function loadPackages() {
            try {
                skeletonLoader.classList.remove('hidden');
                packagesGrid.classList.add('hidden');

                const packagesRef = collection(db, 'PKG_packages');
                const q = query(packagesRef, orderBy('createdAt', 'desc'));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    packagesGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open" style="font-size: 60px; color: #2d224a;"></i>
                            <h3 style="margin-top: 20px;">لا توجد باقات حالياً</h3>
                            <p style="color: #b1a4c2;">سيتم إضافة باقات جديدة قريباً</p>
                        </div>
                    `;
                    packagesGrid.classList.remove('hidden');
                    skeletonLoader.classList.add('hidden');
                    return;
                }

                let html = '';
                for (const doc of querySnapshot.docs) {
                    const pkg = doc.data();
                    const features = pkg.features ? pkg.features.split(',').map(f => f.trim()) : [];
                    
                    // التحقق من اشتراك المستخدم
                    const isSubscribed = await checkUserSubscription(doc.id);

                    html += `
                        <div class="package-card" data-aos="fade-up">
                            <div class="package-badge">${pkg.badge || 'باقة مميزة'}</div>
                            <h3 class="package-name">${pkg.name || 'باقة غير مسماة'}</h3>
                            <div class="package-price">
                                ${pkg.price || '0'} <small>جنيه / ${pkg.duration || 'شهر'}</small>
                            </div>
                            <div class="package-features">
                                ${features.map(f => `
                                    <div class="feature-item">
                                        <i class="fas fa-check-circle"></i>
                                        <span>${f}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="package-date">
                                <i class="fas fa-calendar-alt"></i>
                                <span>تبدأ: ${pkg.startDate || 'غير محدد'}</span>
                            </div>
                            ${isSubscribed ? `
                                <a href="platform.html?packageId=${doc.id}" class="subscribe-btn" style="background: #2e8b57;">
                                    <i class="fas fa-door-open"></i>
                                    الدخول للباقة
                                </a>
                            ` : `
                                <a href="payment.html?packageId=${doc.id}" class="subscribe-btn">
                                    <i class="fas fa-crown"></i>
                                    اشترك الآن
                                </a>
                            `}
                        </div>
                    `;
                }

                packagesGrid.innerHTML = html;
                packagesGrid.classList.remove('hidden');

                if (window.AOS) {
                    AOS.refresh();
                }

            } catch (error) {
                console.error('خطأ في تحميل الباقات:', error);
                packagesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #c44545; font-size: 60px;"></i>
                        <h3 style="margin-top: 20px;">حدث خطأ</h3>
                        <p style="color: #b1a4c2;">${error.message}</p>
                        <button class="subscribe-btn" onclick="location.reload()" style="margin-top: 20px; width: auto; display: inline-flex;">
                            <i class="fas fa-redo-alt"></i>
                            إعادة المحاولة
                        </button>
                    </div>
                `;
                packagesGrid.classList.remove('hidden');
            } finally {
                skeletonLoader.classList.add('hidden');
                loadingScreen.classList.add('hidden');
            }
        }

        // التحقق من المستخدم
        const checkAuth = () => {
            return new Promise((resolve) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.href = 'index.html';
                        return;
                    }

                    try {
                        const localUser = localStorage.getItem('edu_user');
                        if (localUser) {
                            currentUser = JSON.parse(localUser);
                        } else {
                            const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                            if (userDoc.exists()) {
                                currentUser = {
                                    uid: user.uid,
                                    ...userDoc.data()
                                };
                            }
                        }
                        resolve(currentUser);
                    } catch (error) {
                        console.error('خطأ في التحقق:', error);
                        resolve(null);
                    }
                });
            });
        };

        // بدء التطبيق
        const startApp = async () => {
            try {
                createParticles();
                await checkAuth();
                await loadPackages();
                
                if (window.AOS) {
                    AOS.init({ duration: 800, once: true });
                }
            } catch (error) {
                console.error('خطأ في بدء التطبيق:', error);
                loadingScreen.classList.add('hidden');
            }
        };

        window.addEventListener('load', startApp);
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>
</html>
