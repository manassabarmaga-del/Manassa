<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📦 جميع الباقات - منصة البرمجة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #0f0a1f 0%, #1a1330 100%);
            color: white;
            min-height: 100vh;
            padding: 0 12px 20px;
            direction: rtl;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px 0 30px;
        }

        /* شاشة تحميل */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* حالة عدم اتصال */
        .offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #c44545;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        .offline-banner.show { transform: translateY(0); }

        /* رأس الصفحة */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0 24px;
        }
        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(109, 79, 199, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #6d4fc7;
            color: white;
            transform: scale(0.96);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header i.fa-search {
            margin-right: auto;
            font-size: 22px;
            color: #9b8ab0;
            cursor: pointer;
            transition: color 0.2s;
        }
        .header i.fa-search:hover { color: #ffd700; }

        /* شبكة البطاقات */
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        /* بطاقة الباقة */
        .package-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(109, 79, 199, 0.2);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .package-card:hover {
            transform: translateY(-4px);
            border-color: #6d4fc7;
            box-shadow: 0 12px 30px rgba(109, 79, 199, 0.4);
        }

        /* حاوية الصورة */
        .image-wrapper {
            position: relative;
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #2d224a, #1a1330);
            overflow: hidden;
        }
        .package-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .default-img {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            color: #ffd700;
            font-size: 48px;
        }
        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ffd700;
            color: #0f0a1f;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 900;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .badge.special { background: #6d4fc7; color: #ffd700; }

        /* محتوى البطاقة */
        .card-content {
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .package-name {
            font-size: 18px;
            font-weight: 900;
            color: white;
            line-height: 1.3;
        }
        .price-duration {
            display: flex;
            align-items: baseline;
            gap: 4px;
            flex-wrap: wrap;
        }
        .price {
            font-size: 20px;
            font-weight: 900;
            color: #ffd700;
        }
        .duration {
            font-size: 13px;
            color: #b1a4c2;
            margin-right: 4px;
        }
        .features-mini {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 4px 0;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #d0c2e6;
        }
        .feature-item i {
            color: #2e8b57;
            font-size: 12px;
        }
        .start-date {
            font-size: 11px;
            color: #9b8ab0;
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 4px 0 6px;
        }

        /* زر الباقة */
        .package-action {
            width: 100%;
            padding: 14px 8px;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 0 0 24px 24px;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px solid rgba(255,215,0,0.3);
            text-decoration: none;
        }
        .package-action.subscribed {
            background: linear-gradient(145deg, #2e8b57, #3cb371);
        }
        .package-action.disabled {
            background: #4a3b62;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .package-action:active:not(.disabled) { transform: scale(0.98); }

        /* Skeleton Loading */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .skeleton-card {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(109,79,199,0.1);
        }
        .skeleton-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(90deg, #1e1535 25%, #2d224a 50%, #1e1535 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line {
            height: 18px;
            background: linear-gradient(90deg, #1e1535 25%, #2d224a 50%, #1e1535 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            margin: 10px 12px 6px;
        }
        .skeleton-line.short { width: 60%; margin: 0 12px 10px; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* حالات فارغة وخطأ */
        .empty-state {
            grid-column: 1 / -1;
            background: rgba(26,19,48,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 50px 24px;
            text-align: center;
            border: 1px dashed #6d4fc7;
            margin: 20px 0;
        }
        .empty-state i {
            font-size: 64px;
            color: #ffd700;
            opacity: 0.7;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .empty-state p { color: #b1a4c2; }
        .empty-state .retry-btn {
            margin-top: 20px;
            background: #6d4fc7;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
        }

        .error-box {
            grid-column: 1 / -1;
            background: rgba(196, 69, 69, 0.15);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 1px solid #c44545;
        }
        .error-box i { font-size: 48px; color: #c44545; margin-bottom: 16px; }
        .error-box h3 { font-size: 20px; margin-bottom: 8px; color: #ff9b9b; }
        .retry-btn {
            background: #6d4fc7;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            margin-top: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUpToast 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }
        @keyframes slideUpToast {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen"><div class="loader"></div></div>
    <div id="offlineBanner" class="offline-banner"><i class="fas fa-wifi"></i> لا يوجد اتصال بالإنترنت</div>

    <div class="container">
        <div class="header">
            <div class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></div>
            <h1><i class="fas fa-cubes" style="margin-left: 8px;"></i> جميع الباقات</h1>
            <i class="fas fa-search" id="searchIcon"></i>
        </div>

        <div id="packagesContainer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, collection, getDocs, doc, getDoc, 
            query, orderBy, Timestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== عناصر DOM ====================
        const loadingScreen = document.getElementById('loadingScreen');
        const offlineBanner = document.getElementById('offlineBanner');
        const packagesContainer = document.getElementById('packagesContainer');
        const backBtn = document.getElementById('backBtn');
        const searchIcon = document.getElementById('searchIcon');

        // ==================== متغيرات عامة ====================
        let currentUser = null;
        let userActivePackages = {}; // { packageId: subscriptionInfo }
        let allPackages = [];
        let packagesCache = new Map();

        // ==================== دوال مساعدة ====================
        function showToast(text, isError = false) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-message ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i><span>${text}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function checkOnlineStatus() {
            if (!navigator.onLine) {
                offlineBanner.classList.add('show');
                return false;
            }
            offlineBanner.classList.remove('show');
            return true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== التحقق من صلاحية الباقة (باستخدام وقت الخادم) ====================
        function isPackageActive(subscriptionInfo) {
            if (!subscriptionInfo) return false;
            if (!subscriptionInfo.expiresAt) return true;
            
            try {
                const serverTime = Timestamp.now();
                const expiryDate = subscriptionInfo.expiresAt.toDate ? 
                    subscriptionInfo.expiresAt.toDate() : 
                    new Date(subscriptionInfo.expiresAt);
                return expiryDate >= serverTime.toDate();
            } catch (e) {
                console.warn('خطأ في فحص تاريخ الانتهاء:', e);
                return true;
            }
        }

        // ==================== جلب باقات المستخدم النشطة ====================
        async function fetchUserPackages(uid) {
            try {
                const userDoc = await getDoc(doc(db, 'STU_users', uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    userActivePackages = data.activePackages || {};
                } else {
                    userActivePackages = {};
                }
            } catch (error) {
                console.warn('⚠️ فشل جلب باقات المستخدم:', error);
                userActivePackages = {};
            }
        }

        // ==================== جلب جميع الباقات من Firestore ====================
        async function fetchAllPackages() {
            try {
                const packagesCol = collection(db, 'PKG_packages');
                const q = query(packagesCol, orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);
                
                const packages = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        name: data.name || 'باقة تدريب',
                        price: data.price || 0,
                        duration: data.duration || 'شهر',
                        badge: data.badge || null,
                        features: data.features || [],
                        startDate: data.startDate || 'قريباً',
                        imageUrl: data.imageUrl || null,
                        createdAt: data.createdAt
                    };
                });
                
                // تخزين في cache
                packages.forEach(p => packagesCache.set(p.id, p));
                return packages;
            } catch (error) {
                console.error('❌ خطأ في جلب الباقات:', error);
                throw error;
            }
        }

        // ==================== عرض Skeleton ====================
        function showSkeleton() {
            packagesContainer.innerHTML = `
                <div class="skeleton-grid">
                    ${Array(6).fill(0).map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== عرض الباقات ====================
        function renderPackages(packages) {
            if (!packages || packages.length === 0) {
                packagesContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>😔 لا توجد باقات متاحة حالياً</h3>
                        <p>ترقبوا إضافتنا القادمة قريباً!</p>
                        <button class="retry-btn" id="refreshBtn"><i class="fas fa-redo-alt"></i> تحديث</button>
                    </div>
                `;
                document.getElementById('refreshBtn')?.addEventListener('click', () => loadPackages());
                return;
            }

            let html = '<div class="packages-grid">';
            
            packages.forEach(pkg => {
                const pkgId = pkg.id;
                const subscriptionInfo = userActivePackages[pkgId];
                const isSubscribed = subscriptionInfo ? isPackageActive(subscriptionInfo) : false;
                
                const buttonText = isSubscribed ? '🚪 الدخول للباقة' : '💳 اشترك الآن';
                const buttonClass = isSubscribed ? 'package-action subscribed' : 'package-action';
                const linkUrl = isSubscribed ? `platform.html?packageId=${pkgId}` : `payment.html?packageId=${pkgId}`;
                
                const imageHtml = pkg.imageUrl
                    ? `<img src="${pkg.imageUrl}" alt="${escapeHtml(pkg.name)}" class="package-img" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'default-img\'><i class=\'fas fa-box\'></i></div>'">`
                    : `<div class="default-img"><i class="fas fa-box"></i></div>`;
                
                const badgeHtml = pkg.badge ? `<span class="badge ${pkg.badge === 'الأكثر مبيعاً' || pkg.badge === 'مميزة' ? 'special' : ''}">${escapeHtml(pkg.badge)}</span>` : '';
                
                // معالجة المميزات
                let featuresHtml = '';
                if (Array.isArray(pkg.features) && pkg.features.length > 0) {
                    const topFeatures = pkg.features.slice(0, 3);
                    featuresHtml = topFeatures.map(f => `
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>${escapeHtml(f)}</span>
                        </div>
                    `).join('');
                } else if (typeof pkg.features === 'string' && pkg.features.trim()) {
                    const featuresArr = pkg.features.split(',').map(f => f.trim()).slice(0, 3);
                    featuresHtml = featuresArr.map(f => `
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>${escapeHtml(f)}</span>
                        </div>
                    `).join('');
                } else {
                    featuresHtml = `<div class="feature-item"><i class="fas fa-check-circle"></i><span>مميزات متنوعة</span></div>`;
                }
                
                const formattedPrice = typeof pkg.price === 'number' ? pkg.price.toLocaleString() : pkg.price;
                
                html += `
                    <div class="package-card">
                        <div class="image-wrapper">
                            ${imageHtml}
                            ${badgeHtml}
                        </div>
                        <div class="card-content">
                            <h3 class="package-name">${escapeHtml(pkg.name)}</h3>
                            <div class="price-duration">
                                <span class="price"><i class="fas fa-coins" style="font-size: 14px;"></i> ${formattedPrice}</span>
                                <span class="duration">/ ${escapeHtml(pkg.duration)}</span>
                            </div>
                            <div class="features-mini">
                                ${featuresHtml}
                            </div>
                            <div class="start-date">
                                <i class="fas fa-calendar-alt"></i>
                                <span>يبدأ: ${escapeHtml(pkg.startDate)}</span>
                            </div>
                        </div>
                        <a href="${linkUrl}" class="${buttonClass}" data-package-id="${pkgId}">
                            <i class="fas ${isSubscribed ? 'fa-sign-in-alt' : 'fa-crown'}"></i> ${buttonText}
                        </a>
                    </div>
                `;
            });
            
            html += '</div>';
            packagesContainer.innerHTML = html;
        }

        // ==================== عرض خطأ مع إعادة المحاولة ====================
        function showErrorAndRetry(errorMessage) {
            packagesContainer.innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>عذراً، حدث خطأ</h3>
                    <p>${escapeHtml(errorMessage)}</p>
                    <button class="retry-btn" id="retryBtn"><i class="fas fa-redo-alt"></i> إعادة المحاولة</button>
                </div>
            `;
            document.getElementById('retryBtn')?.addEventListener('click', () => {
                showSkeleton();
                loadPackages();
            });
        }

        // ==================== الدالة الرئيسية لتحميل الباقات ====================
        async function loadPackages() {
            if (!checkOnlineStatus()) {
                showErrorAndRetry('لا يوجد اتصال بالإنترنت. يرجى التحقق من الاتصال.');
                return;
            }
            
            showSkeleton();
            
            try {
                // جلب جميع الباقات
                const packages = await fetchAllPackages();
                allPackages = packages;
                
                // عرض الباقات
                renderPackages(packages);
                
            } catch (error) {
                console.error('خطأ في تحميل الباقات:', error);
                showErrorAndRetry(error.message || 'تعذر تحميل الباقات. تحقق من اتصالك.');
            }
        }

        // ==================== التحقق من المستخدم ====================
        async function verifyUser() {
            return new Promise((resolve, reject) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.replace('index.html');
                        reject();
                        return;
                    }
                    
                    try {
                        const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                        if (!userDoc.exists()) {
                            await signOut(auth);
                            window.location.replace('index.html');
                            reject();
                            return;
                        }
                        
                        currentUser = user;
                        // جلب باقات المستخدم النشطة
                        await fetchUserPackages(user.uid);
                        resolve();
                    } catch (error) {
                        console.error('خطأ في جلب بيانات المستخدم:', error);
                        reject(error);
                    }
                });
            });
        }

        // ==================== أحداث ====================
        backBtn.addEventListener('click', () => window.history.back());
        
        searchIcon.addEventListener('click', () => {
            showToast('🔍 ميزة البحث قريباً', false);
        });
        
        // مراقبة حالة الاتصال
        window.addEventListener('online', () => {
            offlineBanner.classList.remove('show');
            showToast('تم استعادة الاتصال بالإنترنت');
            loadPackages();
        });
        window.addEventListener('offline', () => offlineBanner.classList.add('show'));
        
        // ==================== بدء التطبيق ====================
        async function init() {
            try {
                await verifyUser();
                await loadPackages();
            } catch (error) {
                console.error('فشل التهيئة:', error);
            } finally {
                setTimeout(() => loadingScreen.classList.add('hidden'), 500);
            }
        }
        
        init();
    </script>
</body>
</html>
