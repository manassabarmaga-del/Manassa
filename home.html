<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الرئيسية - منصة البرمجة</title>
    <!-- خط Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* ========== الأساسيات ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f0a1f;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(109, 79, 199, 0.3);
            border-radius: 50%;
            animation: float 8s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(100px); opacity: 1; }
        }

        /* المحتوى الرئيسي */
        .content {
            padding: 70px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* شاشة تحميل */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #2d224a;
            border-top-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* حالة عدم اتصال */
        .offline-banner {
            background: #c44545;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10001;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        .offline-banner.show { transform: translateY(0); }

        /* ========== التابات السفلية ========== */
        .tabs-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 19, 48, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 10px;
            z-index: 1000;
            border: 1px solid rgba(109, 79, 199, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .tabs { display: flex; justify-content: space-around; align-items: center; }
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9b8ab0;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 15px;
            transition: all 0.3s ease;
            flex: 1;
        }
        .tab:hover { background: rgba(109, 79, 199, 0.1); }
        .tab.active { color: #8a6cff; background: rgba(109, 79, 199, 0.15); }
        .tab i { font-size: 20px; margin-bottom: 4px; }

        /* زر العودة للأعلى */
        .back-to-top {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #6d4fc7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 5px 20px rgba(109, 79, 199, 0.4);
        }
        .back-to-top.visible { opacity: 1; transform: scale(1); }

        /* ========== Skeleton Loading ========== */
        .skeleton-wrapper { width: 100%; }
        .skeleton-header {
            height: 70px;
            background: rgba(26, 19, 48, 0.8);
            border-radius: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .skeleton-header::after, .skeleton-post::after, .package-skeleton::after, .my-package-skeleton::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.15), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .skeleton-post {
            background: rgba(26, 19, 48, 0.8);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .skeleton-icon { width: 48px; height: 48px; background: rgba(109,79,199,0.3); border-radius: 16px; }
        .skeleton-title { width: 60%; height: 20px; background: rgba(109,79,199,0.3); border-radius: 8px; }
        .skeleton-date { width: 40%; height: 16px; background: rgba(109,79,199,0.2); border-radius: 6px; margin-top: 8px; }
        .skeleton-content { width: 100%; height: 60px; background: rgba(109,79,199,0.2); border-radius: 12px; margin-top: 12px; }
        .package-skeleton { height: 380px; width: 260px; background: rgba(26, 19, 48, 0.8); border-radius: 32px; position: relative; overflow: hidden; }
        .my-package-skeleton { width: 150px; height: 180px; background: rgba(26, 19, 48, 0.8); border-radius: 24px; position: relative; overflow: hidden; }

        /* ========== قسم الترحيب ========== */
        .welcome-section {
            background: rgba(26, 19, 48, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(109, 79, 199, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }
        .welcome-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        .welcome-title span {
            background: linear-gradient(135deg, #6d4fc7, #b49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-sub { display: flex; align-items: center; gap: 8px; color: #b1a4c2; font-size: 14px; }
        .logout-btn {
            background: rgba(255, 99, 99, 0.1);
            border: 1px solid rgba(255, 99, 99, 0.3);
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #ff6b6b; color: white; border-color: #ff6b6b; }

        /* ========== رأس الأقسام ========== */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin: 25px 0 15px;
        }
        .section-title {
            display: flex; align-items: center; gap: 10px;
            background: rgba(26, 19, 48, 0.6); padding: 8px 16px; border-radius: 30px;
            border: 1px solid rgba(109, 79, 199, 0.2);
        }
        .section-title i { color: #ffd700; font-size: 16px; }
        .section-title span { font-weight: 700; color: white; }
        .section-link { color: #9b8ab0; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* ========== قسم باقاتي ========== */
        .my-packages-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 8px 4px 20px;
            scrollbar-width: none;
        }
        .my-packages-scroll::-webkit-scrollbar { display: none; }
        .my-package-card {
            min-width: 150px;
            background: rgba(26, 19, 48, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .my-package-card:hover { transform: translateY(-5px); border-color: #6d4fc7; }
        .my-package-img {
            width: 50px; height: 50px;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .my-package-img i { font-size: 24px; color: #ffd700; }
        .my-package-name { font-weight: 900; font-size: 16px; margin-bottom: 4px; color: white; }
        .my-package-date { font-size: 12px; color: #b1a4c2; display: flex; align-items: center; gap: 4px; }
        .empty-packages-card {
            min-width: 250px;
            background: rgba(26, 19, 48, 0.8);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px dashed #6d4fc7;
        }
        .empty-packages-card i { font-size: 40px; color: #ffd700; opacity: 0.7; }
        .empty-packages-card .btn-browse {
            background: #6d4fc7; color: white; border: none; padding: 10px 20px; border-radius: 40px;
            font-weight: 700; cursor: pointer;
        }

        /* ========== منزلق الباقات ========== */
        .packages-swiper { margin: 0 -16px 20px; padding: 0 16px; }
        .swiper { overflow: visible !important; }
        .swiper-slide { width: 280px !important; }
        .package-card {
            background: linear-gradient(145deg, rgba(26, 19, 48, 0.95), rgba(20, 14, 40, 0.98));
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(109, 79, 199, 0.3);
            position: relative;
        }
        .package-badge {
            position: absolute; top: 15px; right: 15px;
            background: #ffd700; color: #0f0a1f;
            padding: 5px 15px; border-radius: 30px;
            font-size: 12px; font-weight: 900;
        }
        .package-name { font-size: 24px; font-weight: 900; margin: 25px 0 10px; }
        .package-price { font-size: 32px; font-weight: 900; color: #ffd700; margin-bottom: 15px; }
        .package-price small { font-size: 14px; color: #b1a4c2; }
        .feature-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: #d0c2e6; font-size: 14px; }
        .feature-item i { color: #2e8b57; }
        .subscribe-btn {
            width: 100%; background: #ffd700; color: #0f0a1f; border: none; padding: 15px;
            border-radius: 40px; font-weight: 900; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .subscribe-btn:hover { background: #e6c200; transform: scale(0.98); }

        /* ========== منشورات الأخبار ========== */
        .feed-container { margin-top: 30px; }
        .feed-header {
            background: rgba(26, 19, 48, 0.5); padding: 12px 20px; border-radius: 40px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;
        }
        .feed-title { display: flex; align-items: center; gap: 10px; }
        .feed-title i { color: #6d4fc7; background: rgba(109,79,199,0.2); padding: 10px; border-radius: 14px; }
        .feed-title h2 { font-size: 22px; font-weight: 700; }
        .post-item {
            background: rgba(26, 19, 48, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(109, 79, 199, 0.2);
            margin-bottom: 16px;
            transition: 0.3s;
        }
        .post-item:hover { transform: translateX(-4px); border-color: #6d4fc7; }
        .post-header { display: flex; gap: 16px; margin-bottom: 12px; }
        .post-icon {
            width: 56px; height: 56px;
            background: linear-gradient(145deg, #6d4fc7, #8a6cff);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white;
        }
        .post-title h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .post-date { font-size: 12px; color: #9b8ab0; display: flex; align-items: center; gap: 6px; }
        .post-content { color: #d0c2e6; font-size: 14px; line-height: 1.6; margin-bottom: 12px; padding-right: 72px; }
        .post-footer { display: flex; align-items: center; justify-content: space-between; padding-right: 72px; }
        .post-stats { display: flex; align-items: center; gap: 16px; }
        .post-stat {
            display: flex; align-items: center; gap: 6px; color: #9b8ab0; font-size: 14px; cursor: pointer;
            transition: all 0.2s;
        }
        .post-stat.liked { color: #ff6b6b; }
        .post-stat.liked i { font-weight: 900; }
        .post-stat i { transition: 0.2s; }
        .post-read-more { color: #6d4fc7; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer; }

        /* مودال التعليق */
        .comment-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 16px;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .comment-modal.show { visibility: visible; opacity: 1; }
        .comment-box {
            background: #1a132e; border-radius: 32px; padding: 24px; width: 100%; max-width: 400px;
            border: 1px solid #6d4fc7;
        }
        .comment-box textarea {
            width: 100%; height: 100px; background: #2d224a; border: none; border-radius: 24px;
            padding: 16px; color: white; font-family: 'Tajawal'; margin: 16px 0; resize: none;
        }
        .comment-actions { display: flex; gap: 12px; }
        .comment-actions button {
            flex: 1; padding: 12px; border-radius: 30px; border: none; font-weight: 700; cursor: pointer;
        }
        .btn-send { background: #6d4fc7; color: white; }
        .btn-cancel { background: #3a2e4a; color: #b1a4c2; }

        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b3b2a;
            border: 1px solid #2e8b57;
            color: #a0e6c0;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast-message.error {
            background: #3b1f2a;
            border-color: #c44545;
            color: #ff9b9b;
        }
        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 100px; opacity: 1; }
        }

        .empty-state { text-align: center; padding: 50px; color: #b1a4c2; background: rgba(26,19,48,0.6); border-radius: 32px; margin: 20px 0; }
        .empty-state i { font-size: 60px; margin-bottom: 20px; color: #2d224a; }
        .hidden { display: none !important; }
        .infinite-scroll-trigger { height: 20px; margin: 10px 0; display: flex; justify-content: center; }
        .infinite-loader { width: 40px; height: 40px; border: 3px solid rgba(109,79,199,0.2); border-top-color: #6d4fc7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .expired-note {
            background: rgba(196, 69, 69, 0.15);
            border: 1px solid #c44545;
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #ff9b9b;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div id="loadingScreen" class="loading-screen"><div class="loader"></div></div>
    <div id="offlineBanner" class="offline-banner"><i class="fas fa-wifi"></i> لا يوجد اتصال بالإنترنت</div>

    <!-- التابات السفلية -->
    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" id="tabHome"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="tab" id="tabMySubs"><i class="fas fa-crown"></i><span>اشتراكاتي</span></div>
            <div class="tab" id="tabTry"><i class="fas fa-code"></i><span>درب نفسك</span></div>
        </div>
    </div>

    <div class="content" id="mainContent">
        <div id="skeletonLoader" class="skeleton-wrapper">
            <div class="skeleton-header"></div>
            <div class="section-header"><div style="width:150px; height:30px; background:rgba(109,79,199,0.2); border-radius:20px;"></div></div>
            <div style="display:flex; gap:16px; overflow:hidden; margin-bottom:20px;">
                <div class="my-package-skeleton"></div><div class="my-package-skeleton"></div>
            </div>
            <div class="section-header"><div style="width:150px; height:30px; background:rgba(109,79,199,0.2); border-radius:20px;"></div></div>
            <div style="display:flex; gap:16px; overflow:hidden; margin-bottom:20px;">
                <div class="package-skeleton"></div><div class="package-skeleton"></div>
            </div>
            <div><div class="skeleton-post"></div><div class="skeleton-post"></div></div>
        </div>
        <div id="actualContent" class="hidden"></div>
    </div>

    <div class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></div>

    <!-- مودال التعليق -->
    <div id="commentModal" class="comment-modal">
        <div class="comment-box">
            <h3 style="display:flex; align-items:center; gap:8px;"><i class="fas fa-comment"></i> أضف تعليقك</h3>
            <textarea id="commentText" placeholder="اكتب تعليقك هنا..."></textarea>
            <div class="comment-actions">
                <button class="btn-send" id="sendCommentBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
                <button class="btn-cancel" id="cancelCommentBtn">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script type="module">
        // ==================== استيراد Firebase ====================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, doc, getDoc, collection, query, where, 
            getDocs, orderBy, limit, startAfter, addDoc, updateDoc, 
            serverTimestamp, increment, deleteDoc, writeBatch, Timestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };
        
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== عناصر DOM ====================
        const loadingScreen = document.getElementById('loadingScreen');
        const offlineBanner = document.getElementById('offlineBanner');
        const skeletonLoader = document.getElementById('skeletonLoader');
        const actualContent = document.getElementById('actualContent');
        const tabHome = document.getElementById('tabHome');
        const tabMySubs = document.getElementById('tabMySubs');
        const tabTry = document.getElementById('tabTry');
        const backToTop = document.getElementById('backToTop');
        const commentModal = document.getElementById('commentModal');
        const commentText = document.getElementById('commentText');
        const sendCommentBtn = document.getElementById('sendCommentBtn');
        const cancelCommentBtn = document.getElementById('cancelCommentBtn');

        // ==================== متغيرات عامة ====================
        let currentUser = null;
        let userData = { name: 'بشمهندس', activePackages: {} };
        let lastPostDoc = null;
        let hasMorePosts = true;
        let isLoadingPosts = false;
        let currentPostForComment = null;
        let packagesCache = new Map();
        let postsCache = new Map();

        // ==================== جزيئات الخلفية ====================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.width = Math.random() * 6 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.background = `rgba(109, 79, 199, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();

        // ==================== دوال مساعدة ====================
        function showToast(text, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast-message ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i><span>${text}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showError(message) {
            actualContent.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i><h3>عذراً</h3><p>${message}</p><button onclick="location.reload()" style="margin-top:20px; background:#6d4fc7; color:white; border:none; padding:10px 25px; border-radius:30px; cursor:pointer;">إعادة المحاولة</button></div>`;
            actualContent.classList.remove('hidden');
            skeletonLoader.classList.add('hidden');
        }

        function formatRelativeTime(timestamp) {
            if (!timestamp) return 'منذ فترة';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffSeconds = Math.floor((now - date) / 1000);
            if (diffSeconds < 60) return 'الآن';
            const minutes = Math.floor(diffSeconds / 60);
            if (minutes < 60) return `منذ ${minutes} دقيقة`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `منذ ${hours} ساعة`;
            const days = Math.floor(hours / 24);
            return `منذ ${days} يوم`;
        }

        function isPackageExpired(expiresAt) {
            if (!expiresAt) return false;
            try {
                const expiryDate = expiresAt.toDate ? expiresAt.toDate() : new Date(expiresAt);
                return expiryDate < new Date();
            } catch { return false; }
        }

        function checkOnlineStatus() {
            if (!navigator.onLine) {
                offlineBanner.classList.add('show');
                return false;
            }
            offlineBanner.classList.remove('show');
            return true;
        }

        // ==================== التحقق من الجلسة ====================
        async function checkAuthAndLoad() {
            return new Promise((resolve, reject) => {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.replace('index.html');
                        reject();
                        return;
                    }
                    
                    try {
                        const userDoc = await getDoc(doc(db, 'STU_users', user.uid));
                        if (!userDoc.exists()) {
                            await signOut(auth);
                            window.location.replace('index.html');
                            reject();
                            return;
                        }
                        
                        currentUser = user;
                        userData = { uid: user.uid, ...userDoc.data() };
                        localStorage.setItem('edu_user', JSON.stringify({
                            uid: user.uid,
                            name: userData.name,
                            phone: userData.phone,
                            lastVerified: Date.now()
                        }));
                        resolve();
                    } catch (error) {
                        console.error('خطأ في جلب بيانات المستخدم:', error);
                        reject(error);
                    }
                });
            });
        }

        // ==================== جلب باقات الطالب ====================
        async function loadMyPackages() {
            if (!userData.activePackages || typeof userData.activePackages !== 'object') return [];
            
            const packageEntries = Object.entries(userData.activePackages);
            if (packageEntries.length === 0) return [];
            
            const now = new Date();
            const activeEntries = packageEntries.filter(([_, subInfo]) => {
                if (!subInfo.expiresAt) return true;
                try {
                    const expiryDate = subInfo.expiresAt.toDate ? subInfo.expiresAt.toDate() : new Date(subInfo.expiresAt);
                    return expiryDate >= now;
                } catch { return true; }
            });
            
            if (activeEntries.length === 0) return [];
            
            const activePackageIds = activeEntries.map(([pkgId]) => pkgId);
            const packages = [];
            
            for (const pkgId of activePackageIds.slice(0, 10)) {
                if (packagesCache.has(pkgId)) {
                    packages.push(packagesCache.get(pkgId));
                } else {
                    try {
                        const pkgDoc = await getDoc(doc(db, 'PKG_packages', pkgId));
                        if (pkgDoc.exists()) {
                            const pkgData = { id: pkgId, ...pkgDoc.data() };
                            packagesCache.set(pkgId, pkgData);
                            packages.push(pkgData);
                        }
                    } catch (e) { console.warn(`فشل جلب الباقة ${pkgId}:`, e); }
                }
            }
            
            return packages.map(pkg => ({
                ...pkg,
                subscription: activeEntries.find(([id]) => id === pkg.id)?.[1]
            }));
        }

        // ==================== جلب الباقات المميزة ====================
        async function loadFeaturedPackages() {
            try {
                const q = query(collection(db, 'PKG_packages'), orderBy('createdAt', 'desc'), limit(5));
                const snap = await getDocs(q);
                const packages = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                packages.forEach(p => packagesCache.set(p.id, p));
                return packages;
            } catch (e) {
                console.warn("فشل تحميل الباقات المميزة", e);
                return [];
            }
        }

        // ==================== نظام اللايكات والتعليقات (محسّن) ====================
        
        // جلب حالة الإعجاب للمستخدم
        async function getUserLikes(postIds) {
            if (!currentUser || postIds.length === 0) return new Set();
            try {
                const limitedIds = postIds.slice(0, 10);
                const q = query(
                    collection(db, 'post_reactions'),
                    where('userId', '==', currentUser.uid),
                    where('type', '==', 'like'),
                    where('postId', 'in', limitedIds)
                );
                const snap = await getDocs(q);
                return new Set(snap.docs.map(doc => doc.data().postId));
            } catch { return new Set(); }
        }
        
        // معالجة الإعجاب (مع تحديث العدد في Firestore)
        async function handleLike(btn, postId, likesSpan) {
            if (!currentUser) {
                showToast('يجب تسجيل الدخول أولاً', true);
                return;
            }
            
            const isLiked = btn.classList.contains('liked');
            const postRef = doc(db, 'POSTS_feed', postId);
            
            try {
                if (!isLiked) {
                    // إضافة اللايك
                    await addDoc(collection(db, 'post_reactions'), {
                        postId: postId,
                        userId: currentUser.uid,
                        type: 'like',
                        createdAt: serverTimestamp()
                    });
                    
                    // تحديث عدد اللايكات في المنشور
                    await updateDoc(postRef, {
                        likesCount: increment(1)
                    });
                    
                    // تحديث الواجهة
                    const currentCount = parseInt(likesSpan.textContent) || 0;
                    likesSpan.textContent = currentCount + 1;
                    btn.classList.add('liked');
                    showToast('تم الإعجاب بالمنشور');
                } else {
                    // إزالة اللايك (اختياري - حسب المتطلبات)
                    // يمكن إضافة منطق لإزالة اللايك هنا
                    showToast('تم إلغاء الإعجاب', false);
                }
            } catch (error) {
                console.error('خطأ في معالجة الإعجاب:', error);
                showToast('حدث خطأ، حاول مرة أخرى', true);
            }
        }
        
        // معالجة التعليق
        async function addComment(postId, commentTextValue) {
            if (!currentUser) {
                showToast('يجب تسجيل الدخول أولاً', true);
                return false;
            }
            
            if (!commentTextValue.trim()) {
                showToast('يرجى كتابة تعليق', true);
                return false;
            }
            
            try {
                const postRef = doc(db, 'POSTS_feed', postId);
                
                // إضافة التعليق إلى مجموعة التفاعلات
                await addDoc(collection(db, 'post_reactions'), {
                    postId: postId,
                    userId: currentUser.uid,
                    userName: userData.name || 'مستخدم',
                    type: 'comment',
                    commentText: commentTextValue.trim(),
                    createdAt: serverTimestamp()
                });
                
                // تحديث عدد التعليقات في المنشور
                await updateDoc(postRef, {
                    commentsCount: increment(1)
                });
                
                // تحديث الواجهة
                const commentSpan = document.querySelector(`.post-stat[data-post="${postId}"].comment-btn .comments-count`);
                if (commentSpan) {
                    const currentCount = parseInt(commentSpan.textContent) || 0;
                    commentSpan.textContent = currentCount + 1;
                }
                
                showToast('تم إضافة تعليقك بنجاح');
                return true;
            } catch (error) {
                console.error('خطأ في إضافة التعليق:', error);
                showToast('حدث خطأ في إضافة التعليق', true);
                return false;
            }
        }
        
        // ==================== جلب المنشورات مع العدادات ====================
        async function loadPosts(loadMore = false) {
            if (isLoadingPosts || (!hasMorePosts && loadMore)) return [];
            if (!checkOnlineStatus()) return [];
            
            isLoadingPosts = true;
            try {
                let postsQuery = query(
                    collection(db, 'POSTS_feed'),
                    orderBy('createdAt', 'desc'),
                    limit(5)
                );
                
                if (loadMore && lastPostDoc) {
                    postsQuery = query(
                        collection(db, 'POSTS_feed'),
                        orderBy('createdAt', 'desc'),
                        startAfter(lastPostDoc),
                        limit(5)
                    );
                }
                
                const snap = await getDocs(postsQuery);
                if (!snap.empty) lastPostDoc = snap.docs[snap.docs.length - 1];
                hasMorePosts = snap.docs.length === 5;
                
                return snap.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        title: data.title || 'منشور',
                        content: data.content || '',
                        icon: data.icon || 'fa-newspaper',
                        image: data.image || null,
                        createdAt: data.createdAt,
                        author: data.author || 'الإدارة',
                        likesCount: data.likesCount || 0,
                        commentsCount: data.commentsCount || 0
                    };
                });
            } catch (error) {
                console.error('خطأ في جلب المنشورات:', error);
                return [];
            } finally {
                isLoadingPosts = false;
            }
        }
        
        // عرض المنشورات
        async function renderPosts(posts, append = false) {
            const feed = document.getElementById('postsFeed');
            if (!feed) return;
            if (!append) feed.innerHTML = '';
            
            const likedSet = await getUserLikes(posts.map(p => p.id));
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-item';
                card.dataset.postId = post.id;
                const isLiked = likedSet.has(post.id);
                
                card.innerHTML = `
                    <div class="post-header">
                        <div class="post-icon"><i class="fas ${post.icon}"></i></div>
                        <div class="post-title">
                            <h3>${escapeHtml(post.title)}</h3>
                            <div class="post-date"><i class="fas fa-clock"></i> ${formatRelativeTime(post.createdAt)} • بواسطة ${escapeHtml(post.author)}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content.substring(0, 150))}${post.content.length > 150 ? '...' : ''}</div>
                    <div class="post-footer">
                        <div class="post-stats">
                            <div class="post-stat like-btn ${isLiked ? 'liked' : ''}" data-post="${post.id}">
                                <i class="fas fa-heart"></i>
                                <span class="likes-count">${post.likesCount || 0}</span>
                            </div>
                            <div class="post-stat comment-btn" data-post="${post.id}">
                                <i class="fas fa-comment"></i>
                                <span class="comments-count">${post.commentsCount || 0}</span>
                            </div>
                        </div>
                        <div class="post-read-more" data-post="${post.id}">قراءة المزيد <i class="fas fa-arrow-left"></i></div>
                    </div>
                `;
                feed.appendChild(card);
            });
            
            // إضافة أحداث اللايكات والتعليقات
            document.querySelectorAll('.like-btn').forEach(btn => {
                const postId = btn.dataset.post;
                const likesSpan = btn.querySelector('.likes-count');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleLike(btn, postId, likesSpan);
                });
            });
            
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentPostForComment = btn.dataset.post;
                    commentModal.classList.add('show');
                });
            });
            
            document.querySelectorAll('.post-read-more').forEach(btn => {
                btn.addEventListener('click', () => {
                    const post = posts.find(p => p.id === btn.dataset.post);
                    if (post) {
                        alert(`📰 ${post.title}\n\n${post.content}\n\n📅 ${formatRelativeTime(post.createdAt)}`);
                    }
                });
            });
        }
        
        // ==================== تحميل الصفحة الرئيسية ====================
        async function loadHomePage() {
            skeletonLoader.classList.remove('hidden');
            actualContent.classList.add('hidden');
            
            if (!checkOnlineStatus()) {
                showError('لا يوجد اتصال بالإنترنت. يرجى التحقق من الاتصال.');
                skeletonLoader.classList.add('hidden');
                return;
            }
            
            try {
                const [myPackages, featuredPackages, initialPosts] = await Promise.all([
                    loadMyPackages(),
                    loadFeaturedPackages(),
                    loadPosts(false)
                ]);
                
                let html = `
                    <div class="welcome-section" data-aos="fade-down">
                        <div>
                            <h2 class="welcome-title">ازيك يا <span>${escapeHtml(userData.name || 'بشمهندس')}</span> 👋</h2>
                            <div class="welcome-sub"><i class="fas fa-code"></i><span>مستعد تتعلم حاجة جديدة النهاردة؟</span></div>
                        </div>
                        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button>
                    </div>
                `;
                
                // قسم باقاتي
                html += `<div class="section-header"><div class="section-title"><i class="fas fa-crown"></i><span>🗂️ باقاتي</span></div></div>`;
                html += `<div class="my-packages-scroll" id="myPackagesScroll">`;
                
                if (!myPackages || myPackages.length === 0) {
                    html += `<div class="empty-packages-card">
                                <i class="fas fa-frown"></i>
                                <div><h4>لا توجد باقات نشطة حالياً</h4><p style="font-size:12px;">اشترك في باقة جديدة لبدء التعلم</p></div>
                                <button class="btn-browse" id="browsePackagesBtn"><i class="fas fa-search"></i> استعرض الباقات</button>
                            </div>`;
                } else {
                    myPackages.forEach(pkg => {
                        let dateText = pkg.startDate || 'تاريخ قريب';
                        if (pkg.subscription?.expiresAt) {
                            try {
                                const expDate = pkg.subscription.expiresAt.toDate ? pkg.subscription.expiresAt.toDate() : new Date(pkg.subscription.expiresAt);
                                dateText = `ينتهي: ${expDate.toLocaleDateString('ar-EG')}`;
                            } catch(e) {}
                        }
                        html += `<div class="my-package-card" onclick="window.location.href='platform.html?packageId=${pkg.id}'">
                            <div class="my-package-img"><i class="fas fa-cubes"></i></div>
                            <div class="my-package-name">${escapeHtml(pkg.name || 'باقة')}</div>
                            <div class="my-package-date"><i class="fas fa-calendar-alt"></i> ${dateText}</div>
                        </div>`;
                    });
                }
                html += `</div>`;
                
                // قسم الباقات المميزة
                html += `<div class="section-header"><div class="section-title"><i class="fas fa-star"></i><span>الباقات المميزة</span></div><div class="section-link" onclick="window.location.href='packages.html'">عرض الكل <i class="fas fa-arrow-left"></i></div></div>`;
                html += `<div class="packages-swiper"><div class="swiper packagesSwiper"><div class="swiper-wrapper">`;
                
                if (featuredPackages.length === 0) {
                    html += `<div class="swiper-slide"><div style="padding:30px; text-align:center;">لا توجد باقات حالياً</div></div>`;
                } else {
                    featuredPackages.forEach(pkg => {
                        const features = pkg.features ? (Array.isArray(pkg.features) ? pkg.features.slice(0,2) : pkg.features.split(',').slice(0,2).map(f => f.trim())) : [];
                        html += `<div class="swiper-slide"><div class="package-card">
                            <div class="package-badge">${escapeHtml(pkg.badge || 'مميزة')}</div>
                            <h3 class="package-name">${escapeHtml(pkg.name || 'باقة')}</h3>
                            <div class="package-price">${pkg.price || '0'} <small>جنيه / ${escapeHtml(pkg.duration || 'شهر')}</small></div>
                            <div class="package-features">${features.map(f => `<div class="feature-item"><i class="fas fa-check-circle"></i>${escapeHtml(f)}</div>`).join('')}</div>
                            <button class="subscribe-btn" data-id="${pkg.id}"><i class="fas fa-crown"></i> اشترك الآن</button>
                        </div></div>`;
                    });
                }
                html += `</div></div></div>`;
                
                // قسم المنشورات
                html += `<div class="feed-container"><div class="feed-header"><div class="feed-title"><i class="fas fa-rss"></i><h2>آخر الأخبار</h2></div><span class="feed-badge">جديد</span></div>`;
                html += `<div id="postsFeed" class="posts-feed"></div>`;
                html += `<div id="infiniteTrigger" class="infinite-scroll-trigger"></div></div>`;
                
                actualContent.innerHTML = html;
                skeletonLoader.classList.add('hidden');
                actualContent.classList.remove('hidden');
                
                // عرض المنشورات
                await renderPosts(initialPosts, false);
                setupInfiniteScroll();
                
                // أحداث الأزرار
                document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                    await signOut(auth);
                    localStorage.removeItem('edu_user');
                    window.location.replace('index.html');
                });
                document.getElementById('browsePackagesBtn')?.addEventListener('click', () => window.location.href = 'packages.html');
                document.querySelectorAll('.subscribe-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.location.href = `payment.html?packageId=${btn.dataset.id}`;
                    });
                });
                
                // تهيئة Swiper
                new Swiper('.packagesSwiper', {
                    slidesPerView: 'auto',
                    spaceBetween: 16,
                    rtl: true
                });
                
                AOS.init({ duration: 800, once: true });
                
            } catch (error) {
                console.error('خطأ في تحميل الصفحة:', error);
                showError('حدث خطأ في تحميل الصفحة. يرجى إعادة المحاولة.');
            } finally {
                setTimeout(() => loadingScreen.classList.add('hidden'), 500);
            }
        }
        
        // ==================== Infinite Scroll ====================
        function setupInfiniteScroll() {
            const trigger = document.getElementById('infiniteTrigger');
            if (!trigger) return;
            
            const observer = new IntersectionObserver(async (entries) => {
                if (entries[0].isIntersecting && hasMorePosts && !isLoadingPosts) {
                    trigger.innerHTML = '<div class="infinite-loader"></div>';
                    try {
                        const newPosts = await loadPosts(true);
                        trigger.innerHTML = '';
                        if (newPosts.length > 0) {
                            await renderPosts(newPosts, true);
                        } else {
                            hasMorePosts = false;
                        }
                    } catch (error) {
                        console.error('خطأ في تحميل المزيد:', error);
                        trigger.innerHTML = '';
                        hasMorePosts = false;
                    }
                }
            }, { threshold: 0.1 });
            
            observer.observe(trigger);
        }
        
        // ==================== أحداث المودال ====================
        sendCommentBtn.addEventListener('click', async () => {
            if (currentPostForComment) {
                const success = await addComment(currentPostForComment, commentText.value);
                if (success) {
                    commentModal.classList.remove('show');
                    commentText.value = '';
                }
            }
        });
        
        cancelCommentBtn.addEventListener('click', () => {
            commentModal.classList.remove('show');
            commentText.value = '';
        });
        
        // ==================== أحداث التابات ====================
        tabHome.addEventListener('click', () => window.location.reload());
        tabMySubs.addEventListener('click', () => window.location.href = `pay.html`);
        tabTry.addEventListener('click', () => window.location.href = `try.html`);
        
        // ==================== زر العودة للأعلى ====================
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 300);
        });
        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        
        // ==================== مراقبة حالة الاتصال ====================
        window.addEventListener('online', () => {
            offlineBanner.classList.remove('show');
            showToast('تم استعادة الاتصال بالإنترنت');
            location.reload();
        });
        window.addEventListener('offline', () => {
            offlineBanner.classList.add('show');
        });
        
        // ==================== بدء التطبيق ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function init() {
            try {
                await checkAuthAndLoad();
                await loadHomePage();
            } catch (error) {
                console.error('فشل التهيئة:', error);
                loadingScreen.classList.add('hidden');
                showError('فشل تحميل البيانات. يرجى التحقق من الاتصال وإعادة المحاولة.');
            }
        }
        
        init();
    </script>
</body>
