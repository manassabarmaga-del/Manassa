<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الرئيسية - منصة البرمجة</title>
    <!-- خط Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* نفس التنسيقات السابقة مع إضافة تعديلات بسيطة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0519;
            color: #ffffff;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(109, 79, 199, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(180, 154, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(109, 79, 199, 0.3);
            border-radius: 50%;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* التابات */
        .tabs-container {
            background: rgba(26, 19, 48, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(109, 79, 199, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 8px;
            max-width: 400px;
            margin: 0 auto;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: #9b8ab0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(109, 79, 199, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .tab:active::before {
            width: 200px;
            height: 200px;
        }

        .tab i {
            margin-left: 6px;
            font-size: 14px;
            transition: transform 0.3s;
        }

        .tab:hover i {
            transform: scale(1.2);
        }

        .tab.active {
            background: linear-gradient(135deg, #6d4fc7, #9575ff);
            color: white;
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.4);
            transform: translateY(-2px);
        }

        /* المحتوى الرئيسي */
        .content {
            padding: 20px 16px;
            padding-bottom: 100px;
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1a1330 25%, #2a1f40 50%, #1a1330 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 16px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-title {
            height: 40px;
            width: 60%;
            margin-bottom: 16px;
        }

        .skeleton-text {
            height: 20px;
            width: 80%;
            margin-bottom: 12px;
        }

        .skeleton-card {
            height: 300px;
            width: 100%;
            border-radius: 24px;
            margin-bottom: 16px;
        }

        /* قسم الترحيب */
        .welcome-section {
            margin-bottom: 32px;
            position: relative;
            animation: slideInDown 0.6s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(109, 79, 199, 0.3);
        }

        .welcome-title span {
            background: linear-gradient(135deg, #6d4fc7, #b49aff, #8a6cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .welcome-sub {
            font-size: 16px;
            color: #b1a4c2;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(109, 79, 199, 0.2);
            width: fit-content;
        }

        .welcome-sub i {
            color: #6d4fc7;
            font-size: 16px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* عنوان القسم */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            animation: fadeIn 0.8s ease;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #6d4fc7;
            font-size: 20px;
            background: rgba(109, 79, 199, 0.2);
            padding: 8px;
            border-radius: 12px;
            animation: rotate 4s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .section-link {
            color: #b49aff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            background: rgba(109, 79, 199, 0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .section-link:hover {
            background: rgba(109, 79, 199, 0.3);
            transform: translateX(-4px);
        }

        /* Swiper للباقات */
        .packages-swiper {
            margin: 0 -16px 30px -16px;
            padding: 4px 16px 20px 16px;
            animation: slideInUp 0.8s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .swiper-slide {
            width: 280px;
            height: auto;
        }

        /* بطاقة الباقة */
        .package-card {
            background: linear-gradient(145deg, rgba(30, 21, 53, 0.9), rgba(23, 17, 41, 0.95));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid rgba(109, 79, 199, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .package-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #6d4fc7, #b49aff, #6d4fc7);
            background-size: 200% 100%;
            animation: gradientMove 3s infinite linear;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .package-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #6d4fc7;
            box-shadow: 0 30px 50px rgba(109, 79, 199, 0.3);
        }

        .package-badge {
            background: linear-gradient(135deg, rgba(109, 79, 199, 0.3), rgba(180, 154, 255, 0.3));
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(109, 79, 199, 0.5);
            backdrop-filter: blur(5px);
            width: fit-content;
        }

        .package-name {
            font-size: 24px;
            font-weight: 900;
            color: white;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .package-price {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #b49aff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .package-price small {
            font-size: 14px;
            font-weight: 500;
            color: #9b8ab0;
            -webkit-text-fill-color: #9b8ab0;
        }

        .package-features {
            margin-bottom: 20px;
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #d0c2e6;
            margin-bottom: 10px;
            transition: transform 0.3s;
        }

        .feature-item:hover {
            transform: translateX(-4px);
        }

        .feature-item i {
            color: #6d4fc7;
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        .package-date {
            font-size: 12px;
            color: #8f7da8;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            width: fit-content;
        }

        .subscribe-btn {
            width: 100%;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff, #6d4fc7);
            background-size: 200% 100%;
            border: none;
            color: white;
            padding: 16px 0;
            border-radius: 40px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .subscribe-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .subscribe-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .subscribe-btn:hover {
            background-position: 100% 0;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(109, 79, 199, 0.5);
        }

        .subscribe-btn i {
            font-size: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* أخبار */
        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .news-item {
            background: rgba(26, 19, 48, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            border: 1px solid rgba(109, 79, 199, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .news-item::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #6d4fc7, #b49aff);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .news-item:hover {
            transform: translateX(-4px);
            border-color: #6d4fc7;
            background: rgba(26, 19, 48, 0.95);
        }

        .news-item:hover::before {
            opacity: 1;
        }

        .news-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.3);
            transition: all 0.3s;
        }

        .news-item:hover .news-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .news-content {
            flex: 1;
        }

        .news-content h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            color: white;
        }

        .news-content p {
            font-size: 13px;
            color: #b1a4c2;
        }

        /* شاشة تحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0519;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(109, 79, 199, 0.1);
            border-top-color: #6d4fc7;
            border-right-color: #b49aff;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            position: relative;
        }

        .loader::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 4px solid transparent;
            border-top-color: #9575ff;
            border-right-color: #6d4fc7;
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Skeleton Loading */
        .skeleton-wrapper {
            padding: 16px 0;
        }

        .skeleton-header {
            height: 50px;
            width: 100%;
            background: rgba(26, 19, 48, 0.8);
            border-radius: 30px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        .skeleton-card {
            height: 320px;
            width: 100%;
            background: rgba(26, 19, 48, 0.8);
            border-radius: 32px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(109, 79, 199, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* رسالة خطأ */
        .error-box {
            background: rgba(45, 31, 58, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ff6b6b;
            color: #ff9b9b;
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            margin: 40px 0;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-box i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .error-box button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border: none;
            border-radius: 30px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .error-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* زر العودة للأعلى */
        .back-to-top {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6d4fc7, #8a6cff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(109, 79, 199, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: translateY(-5px);
        }

        /* مؤشر التمرير */
        .scroll-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 8px 0 16px;
        }

        .scroll-dot {
            width: 6px;
            height: 6px;
            background: #2d224a;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .scroll-dot.active {
            width: 20px;
            background: #6d4fc7;
            border-radius: 10px;
        }

        /* User info in header */
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(109, 79, 199, 0.2);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(109, 79, 199, 0.3);
            margin-right: 10px;
        }

        .user-badge i {
            color: #ffb5a7;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- جزيئات متحركة -->
    <div class="particles" id="particles"></div>

    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- التابات -->
    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" id="tabHome">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="tab" id="tabMySubs">
                <i class="fas fa-crown"></i>
                <span>اشتراكاتي</span>
            </div>
            <div class="tab" id="tabTry">
                <i class="fas fa-code"></i>
                <span>درب نفسك</span>
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="content" id="mainContent">
        <!-- Skeleton Loading -->
        <div id="skeletonLoader" class="skeleton-wrapper">
            <div class="skeleton-header"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-header" style="width: 50%;"></div>
            <div class="skeleton-card" style="height: 100px;"></div>
            <div class="skeleton-card" style="height: 100px;"></div>
        </div>
        
        <!-- المحتوى الفعلي (مخفي في البداية) -->
        <div id="actualContent" class="hidden">
            <!-- سيتم ملؤها بالجافاسكريبت -->
        </div>
    </div>

    <!-- زر العودة للأعلى -->
    <div class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- Firebase SDK (مودرن V9) -->
    <script type="import">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPgtF_GqT95QkMwwoJMGiZWFPjHFdA_N0",
            authDomain: "manassa-oloom.firebaseapp.com",
            databaseURL: "https://manassa-oloom-default-rtdb.firebaseio.com",
            projectId: "manassa-oloom",
            storageBucket: "manassa-oloom.firebasestorage.app",
            messagingSenderId: "475047988456",
            appId: "1:475047988456:web:ab25a9b01b5c77483b0d5d",
            measurementId: "G-F0N011WQB9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        const skeletonLoader = document.getElementById('skeletonLoader');
        const actualContent = document.getElementById('actualContent');
        const tabHome = document.getElementById('tabHome');
        const tabMySubs = document.getElementById('tabMySubs');
        const tabTry = document.getElementById('tabTry');
        const backToTop = document.getElementById('backToTop');
        const particlesContainer = document.getElementById('particles');

        // متغيرات عامة
        let currentUser = null;
        let userData = null;

        // ====== نظام التحقق من الهوية (Auth Guard) ======
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // لا يوجد مستخدم - توجيه فوري لصفحة التسجيل
                window.location.replace('index.html');
                return;
            }

            // يوجد مستخدم - حفظ البيانات وجلب معلوماته من Firestore
            currentUser = user;
            
            try {
                // جلب بيانات المستخدم من Firestore باستخدام uid
                const userDocRef = doc(db, 'STU_users', user.uid);
                const userDocSnap = await getDoc(userDocRef);
                
                if (userDocSnap.exists()) {
                    userData = userDocSnap.data();
                    console.log('User data loaded:', userData);
                    
                    // إخفاء شاشة التحميل
                    loadingScreen.classList.add('hidden');
                    
                    // تحميل المحتوى الرئيسي
                    await loadHomePage();
                } else {
                    // المستخدم موجود في Auth لكن ليس في Firestore
                    console.error('User data not found in Firestore');
                    window.location.replace('index.html');
                }
            } catch (error) {
                console.error('Error loading user data:', error);
                showError('حدث خطأ في تحميل بيانات المستخدم');
                loadingScreen.classList.add('hidden');
            }
        });

        // إنشاء جزيئات متحركة
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = `rgba(109, 79, 199, ${Math.random() * 0.5})`;
                particlesContainer.appendChild(particle);
            }
        }

        // تهيئة AOS
        AOS.init({
            duration: 800,
            once: true,
        });

        createParticles();

        // إظهار/إخفاء زر العودة للأعلى
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // دالة عرض الخطأ
        function showError(message) {
            skeletonLoader.classList.add('hidden');
            actualContent.classList.add('hidden');
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-box';
            errorDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <p style="font-size: 16px; margin-bottom: 10px;">${message}</p>
                <p style="font-size: 14px; color: #b1a4c2; margin-bottom: 20px;">يرجى المحاولة مرة أخرى</p>
                <button onclick="location.reload()">
                    <i class="fas fa-redo-alt"></i> إعادة المحاولة
                </button>
            `;
            
            mainContent.innerHTML = '';
            mainContent.appendChild(errorDiv);
        }

        // دالة تحميل الباقات من Firestore
        async function loadPackages() {
            try {
                const packagesRef = collection(db, 'PKG_packages');
                const q = query(packagesRef, orderBy('createdAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    return `
                        <div class="swiper-slide">
                            <div style="text-align: center; padding: 40px; color: #b1a4c2;">
                                <i class="fas fa-box-open" style="font-size: 50px; margin-bottom: 15px; color: #6d4fc7;"></i>
                                <p>لا توجد باقات حالياً</p>
                            </div>
                        </div>
                    `;
                }

                let packagesHTML = '';
                querySnapshot.forEach(doc => {
                    const pkg = doc.data();
                    const features = pkg.features ? pkg.features.split(',').map(f => f.trim()) : [];
                    
                    packagesHTML += `
                        <div class="swiper-slide">
                            <div class="package-card">
                                <div class="package-badge">${pkg.badge || 'باقة مميزة'}</div>
                                <h3 class="package-name">${pkg.name || 'باقة غير مسماة'}</h3>
                                <div class="package-price">
                                    ${pkg.price || '0'} <small>جنيه / ${pkg.duration || 'شهر'}</small>
                                </div>
                                <div class="package-features">
                                    ${features.map(f => `
                                        <div class="feature-item">
                                            <i class="fas fa-check-circle"></i>
                                            <span>${f}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="package-date">
                                    <i class="fas fa-calendar-alt"></i>
                                    <span>تبدأ: ${pkg.startDate || 'غير محدد'}</span>
                                </div>
                                <button class="subscribe-btn" data-package-id="${doc.id}" data-package-name="${pkg.name}">
                                    <i class="fas fa-crown"></i>
                                    اشترك الآن
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                return packagesHTML;
            } catch (error) {
                console.error('Error loading packages:', error);
                throw error;
            }
        }

        // دالة تحميل الصفحة الرئيسية
        async function loadHomePage() {
            try {
                // إظهار skeleton loader
                skeletonLoader.classList.remove('hidden');
                actualContent.classList.add('hidden');

                // جلب الباقات
                const packagesHTML = await loadPackages();

                // أخبار متنوعة (static)
                const newsItems = [
                    {
                        icon: 'fa-rocket',
                        title: 'منصة البرمجة تطلق باقات جديدة',
                        desc: 'تحديثات مستمرة ومحتوى حصري'
                    },
                    {
                        icon: 'fa-graduation-cap',
                        title: 'ودرس جديد في بايثون',
                        desc: 'متاح للمشتركين في الباقة الذهبية'
                    },
                    {
                        icon: 'fa-trophy',
                        title: 'مسابقة البرمجة الشهرية',
                        desc: 'جوائز قيمة للمتميزين'
                    },
                    {
                        icon: 'fa-clock',
                        title: 'تحديث المنهج',
                        desc: 'إضافة مشاريع عملية جديدة'
                    }
                ];

                const newsHTML = newsItems.map((item, index) => `
                    <div class="news-item" data-aos="fade-up" data-aos-delay="${index * 100}">
                        <div class="news-icon"><i class="fas ${item.icon}"></i></div>
                        <div class="news-content">
                            <h4>${item.title}</h4>
                            <p>${item.desc}</p>
                        </div>
                        <i class="fas fa-chevron-left" style="color: #6d4fc7;"></i>
                    </div>
                `).join('');

                // بناء المحتوى
                actualContent.innerHTML = `
                    <div class="welcome-section" data-aos="fade-down">
                        <h2 class="welcome-title">
                            أهلاً، <span>${userData?.name || 'بشمهندس'}</span> 👋
                            <span class="user-badge">
                                <i class="fas fa-check-circle"></i>
                                ${userData?.phone || ''}
                            </span>
                        </h2>
                        <div class="welcome-sub">
                            <i class="fas fa-code"></i>
                            <span>مستعد تتعلم حاجة جديدة النهاردة؟</span>
                        </div>
                    </div>

                    <div class="section-header" data-aos="fade-left">
                        <div class="section-title">
                            <i class="fas fa-cubes"></i>
                            <span>الباقات المميزة</span>
                        </div>
                        <div class="section-link" onclick="window.location.href='packages.html'">
                            عرض الكل <i class="fas fa-arrow-left"></i>
                        </div>
                    </div>

                    <div class="packages-swiper" data-aos="fade-up">
                        <div class="swiper packagesSwiper">
                            <div class="swiper-wrapper">
                                ${packagesHTML}
                            </div>
                            <div class="scroll-indicator">
                                <div class="scroll-dot active"></div>
                                <div class="scroll-dot"></div>
                                <div class="scroll-dot"></div>
                            </div>
                        </div>
                    </div>

                    <div class="section-header" style="margin-top: 20px;" data-aos="fade-left">
                        <div class="section-title">
                            <i class="fas fa-newspaper"></i>
                            <span>آخر الأخبار</span>
                        </div>
                    </div>

                    <div class="news-grid">
                        ${newsHTML}
                    </div>
                `;

                // إخفاء skeleton وإظهار المحتوى
                skeletonLoader.classList.add('hidden');
                actualContent.classList.remove('hidden');

                // تهيئة Swiper
                setTimeout(() => {
                    try {
                        const swiper = new Swiper('.packagesSwiper', {
                            slidesPerView: 'auto',
                            spaceBetween: 16,
                            centeredSlides: false,
                            rtl: true,
                            on: {
                                slideChange: function() {
                                    const dots = document.querySelectorAll('.scroll-dot');
                                    dots.forEach((dot, index) => {
                                        if (index === this.activeIndex) {
                                            dot.classList.add('active');
                                        } else {
                                            dot.classList.remove('active');
                                        }
                                    });
                                }
                            }
                        });
                    } catch (e) {
                        console.error('Swiper init error:', e);
                    }
                }, 100);

                // إضافة event listeners للأزرار
                setTimeout(() => {
                    document.querySelectorAll('.subscribe-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const packageId = btn.dataset.packageId;
                            const packageName = btn.dataset.packageName;
                            
                            // تأثير بصري
                            btn.style.transform = 'scale(0.95)';
                            setTimeout(() => {
                                btn.style.transform = '';
                            }, 200);
                            
                            // تخزين البيانات في sessionStorage
                            sessionStorage.setItem('selectedPackage', JSON.stringify({
                                id: packageId,
                                name: packageName,
                                uid: currentUser?.uid
                            }));
                            
                            // تأخير بسيط للانتقال
                            setTimeout(() => {
                                window.location.href = 'payment.html';
                            }, 300);
                        });
                    });
                }, 200);

            } catch (error) {
                console.error('Error loading home page:', error);
                skeletonLoader.classList.add('hidden');
                showError('حدث خطأ في تحميل الصفحة: ' + error.message);
            }
        }

        // تفعيل التابات
        function activateTab(tabId) {
            [tabHome, tabMySubs, tabTry].forEach(t => t.classList.remove('active'));
            
            if (tabId === 'home') {
                tabHome.classList.add('active');
                loadHomePage();
            } else if (tabId === 'subs') {
                tabMySubs.classList.add('active');
                
                // إظهار skeleton loader
                skeletonLoader.classList.remove('hidden');
                actualContent.classList.add('hidden');
                
                // محتوى مؤقت مع تحويل
                setTimeout(() => {
                    window.location.href = 'pay.html?uid=' + (currentUser?.uid || '');
                }, 1000);
                
            } else if (tabId === 'try') {
                tabTry.classList.add('active');
                
                // إظهار skeleton loader
                skeletonLoader.classList.remove('hidden');
                actualContent.classList.add('hidden');
                
                // تحويل مع uid
                setTimeout(() => {
                    window.location.href = 'try.html?uid=' + (currentUser?.uid || '');
                }, 1000);
            }
        }

        // Event listeners
        tabHome.addEventListener('click', () => activateTab('home'));
        tabMySubs.addEventListener('click', () => activateTab('subs'));
        tabTry.addEventListener('click', () => activateTab('try'));

        // حفظ حالة التمرير
        window.addEventListener('beforeunload', () => {
            sessionStorage.setItem('scrollPosition', window.scrollY);
        });

        // استعادة حالة التمرير
        const savedScroll = sessionStorage.getItem('scrollPosition');
        if (savedScroll) {
            setTimeout(() => {
                window.scrollTo(0, parseInt(savedScroll));
                sessionStorage.removeItem('scrollPosition');
            }, 100);
        }
    </script>

    <!-- AOS JS و Swiper JS (CDN) -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</body>
</html>
