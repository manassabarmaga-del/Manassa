<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>الامتحان الإلكتروني | الصف الرابع الابتدائي |  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e8f0f7 0%, #d9e4ee 100%);
            font-family: 'Cairo', system-ui, sans-serif;
            padding: 14px;
            min-height: 100vh;
        }

        .exam-container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* الهيدر الملون للأطفال */
        .kid-header {
            background: linear-gradient(135deg, #2b6e9e 0%, #1a4f73 100%);
            border-radius: 28px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
            border-bottom: 3px solid #ffcc33;
        }
        .kid-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .kid-header h1 i {
            color: #ffcc33;
            font-size: 1.6rem;
        }
        .sub-title {
            font-size: 0.75rem;
            color: #d4ecff;
            margin-top: 8px;
            border-right: 3px solid #ffcc33;
            padding-right: 10px;
        }
        .eng-bar-kid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 60px;
            padding: 6px 15px;
            font-size: 0.7rem;
        }
        .eng-name {
            color: #fff3cf;
            font-weight: 600;
        }
        .reset-btn-kid {
            background: rgba(255,204,51,0.25);
            border: 1px solid #ffcc33;
            padding: 5px 14px;
            border-radius: 40px;
            color: #fff3cf;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.7rem;
        }
        .reset-btn-kid:active {
            transform: scale(0.96);
            background: #ffcc33;
            color: #1a4f73;
        }

        /* بطاقة السؤال */
        .question-card-kid {
            background: white;
            border-radius: 32px;
            padding: 20px 18px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            border: 1px solid #cbdde9;
        }

        /* رأس السؤال */
        .q-head-kid {
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 3px solid #ffdd99;
            padding-bottom: 10px;
            margin-bottom: 16px;
        }
        .q-num-kid {
            background: #ffaa33;
            color: #2b5a7a;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .q-title-kid {
            font-weight: 700;
            color: #2c5a7a;
            font-size: 0.9rem;
        }

        /* نص السؤال */
        .question-text-kid {
            background: #f0f7fe;
            padding: 14px 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #1a4a6e;
            margin-bottom: 16px;
            border-right: 5px solid #ffaa33;
            line-height: 1.5;
        }

        /* خيارات - كل خيار بطاقة منفصلة مع تحسينات للأطفال */
        .options-kid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }
        .option-card-kid {
            background: #fefef7;
            border: 2px solid #d4e2ed;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .option-card-kid:active {
            transform: scale(0.97);
            background: #fff6e0;
        }
        @media (hover: hover) {
            .option-card-kid:hover {
                background: #fff9ef;
                border-color: #ffaa33;
                transform: translateY(-2px);
                box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            }
        }
        .opt-letter-kid {
            background: #e8f0f7;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            color: #d48d1a;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .opt-text-kid {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.4;
            color: #2a4d6e;
        }

        /* التلوين بعد الاختيار */
        .option-card-kid.opt-correct {
            background: #d4f5e5;
            border-color: #2e9b6e;
            cursor: default;
            pointer-events: none;
        }
        .option-card-kid.opt-correct .opt-letter-kid {
            background: #b8e0cc;
            color: #1d6b48;
        }
        .option-card-kid.opt-wrong {
            background: #ffe0db;
            border-color: #e67e5c;
            cursor: default;
            pointer-events: none;
        }
        .option-card-kid.opt-wrong .opt-letter-kid {
            background: #ffcec4;
            color: #bc5a3a;
        }
        .option-card-kid.opt-show-correct {
            background: #d4f5e5;
            border-color: #2e9b6e;
        }
        .option-card-kid.opt-show-correct .opt-letter-kid {
            background: #b8e0cc;
            color: #1d6b48;
        }

        /* تعطيل الخيارات بعد الإجابة */
        .options-disabled .option-card-kid {
            pointer-events: none;
            opacity: 0.85;
        }

        /* الفيدباك (الشرح والتصحيح) */
        .feedback-kid {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.55;
            display: none;
        }
        .feedback-correct-kid {
            background: #e2f3ea;
            border-right: 5px solid #2e9b6e;
            display: block;
            color: #1a5a3e;
        }
        .feedback-wrong-kid {
            background: #fef0ea;
            border-right: 5px solid #e67e5c;
            display: block;
            color: #a14a2a;
        }

        /* أزرار التنقل */
        .nav-kid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0 12px;
        }
        .nav-btn-kid {
            background: #2b6e9e;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-family: 'Cairo';
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .nav-btn-kid:active {
            transform: scale(0.96);
            background: #ffaa33;
            color: #1a4f73;
        }
        .nav-btn-kid:disabled {
            background: #9ab3c5;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .progress-kid {
            text-align: center;
            margin: 10px 0;
            font-weight: 600;
            color: #2b5a7a;
            background: #ffffffcc;
            width: fit-content;
            margin-inline: auto;
            padding: 5px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #5a7f9e;
            font-size: 0.7rem;
            padding-bottom: 20px;
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .question-card-kid {
                padding: 16px;
            }
            .option-card-kid {
                padding: 10px 14px;
                gap: 12px;
            }
            .opt-letter-kid {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .opt-text-kid {
                font-size: 0.82rem;
            }
            .question-text-kid {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="exam-container">
    <div class="kid-header">
        <h1><i class="fas fa-rocket"></i>   </h1>
        <div class="sub-title">الصف الرابع الابتدائي | 25 سؤالاً | اختر الإجابة الصحيحة</div>
        <div class="eng-bar-kid">
            <div class="eng-name"><i class="fas fa-user-graduate"></i> إعداد: Eng Ismail Emad | 01122104596 | manassaeloloom.com</div>
            <div class="reset-btn-kid" id="resetExamBtn"><i class="fas fa-undo-alt"></i> إعادة تعيين</div>
        </div>
    </div>

    <div id="currentQuestionArea"></div>
    <div class="nav-kid">
        <button class="nav-btn-kid" id="prevBtn"><i class="fas fa-chevron-right"></i> السابق</button>
        <button class="nav-btn-kid" id="nextBtn">التالي <i class="fas fa-chevron-left"></i></button>
    </div>
    <div class="progress-kid" id="progressText"></div>
    <footer>🌟 اضغط على الإجابة — يظهر لك التصحيح مع الشرح الجميل 🌟</footer>
</div>

<script>
    // بيانات الأسئلة الـ 25 مع الإجابات الصحيحة والشرح المبسط للأطفال
    const examData = [
        { text: "البطارية التي توضع داخل الألعاب تعتبر مصدرًا للطاقة:", options: ["الحرارية", "الكيميائية", "الحركية", "الصوتية"], correct: 1, rule: "البطارية تحول الطاقة الكيميائية المخزنة داخلها إلى طاقة كهربائية تشغل اللعبة." },
        { text: "عربة استكشاف المريخ الشهيرة تسمى:", options: ["سبيريت", "أوبورتيونيتي", "كيريوستي", "ديسكفري"], correct: 2, rule: "مركبة 'كيريوستي' (Curiosity) هي أشهر عربة استكشاف على المريخ." },
        { text: "تحتاج الروبوتات إلى طاقة ........ لتشغيلها والقيام بمهامها:", options: ["مغناطيسية", "كهربائية", "وضع", "نووية"], correct: 1, rule: "الروبوتات تعمل بالكهرباء المخزنة في بطارياتها أو من مصدر كهربائي." },
        { text: "المصدر الرئيسي والأساسي لمعظم الطاقات على الأرض هو:", options: ["القمر", "الرياح", "الشمس", "باطن الأرض"], correct: 2, rule: "الشمس هي المصدر الأول للطاقة (ضوء، حرارة، رياح، نباتات)." },
        { text: "يختزن جسم الإنسان طاقة ........ مستمدة من الغذاء:", options: ["حركية", "كيميائية", "ضوئية", "صوتية"], correct: 1, rule: "الغذاء يحتوي على طاقة كيميائية يحرقها الجسم ليعمل." },
        { text: "تصل طاقة الشمس إلى الأرض في صورة طاقة:", options: ["صوتية وحركية", "إشعاعية (ضوء وحرارة)", "كيميائية ووضع", "نووية فقط"], correct: 1, rule: "الشمس ترسل لنا ضوء وحرارة (طاقة إشعاعية)." },
        { text: "يحول النبات الطاقة الشمسية إلى طاقة كيميائية تختزن في صورة:", options: ["أملاح معدنية", "مواد سكرية", "ماء", "غاز أكسجين"], correct: 1, rule: "النبات يصنع سكريات (غلوكوز) ويخزن فيها الطاقة الكيميائية." },
        { text: "مدخلات الطاقة في مجفف الشعر هي الطاقة:", options: ["الحرارية", "الصوتية", "الكهربائية", "الحركية"], correct: 2, rule: "مجفف الشعر يستهلك كهرباء لتوليد حرارة ورياح." },
        { text: "الطاقة الناتجة من المصباح الكهربي والتي تعتبر 'طاقة مهدرة' هي:", options: ["الضوئية", "الحرارية", "الكيميائية", "الكهربائية"], correct: 1, rule: "المصباح ينتج ضوء (مرغوب) وحرارة (طاقة مهدرة)." },
        { text: "تتبع مسارات الطاقة من دخولها للجهاز وحتى خروجها يسمى:", options: ["قانون الفناء", "سلسلة صور الطاقة", "استهلاك الطاقة", "فقدان الطاقة"], correct: 1, rule: "سلسلة صور الطاقة توضح تحولات الطاقة داخل الجهاز." },
        { text: "أي مما يلي يعتبر مثالاً للوقود الحيوي المتجدد؟", options: ["الفحم", "البنزين", "الخشب", "الغاز الطبيعي"], correct: 2, rule: "الخشب وقود حيوي متجدد لأننا نزرع أشجاراً جديدة." },
        { text: "الوقود هو مادة تنتج طاقة ........ عند حرقها:", options: ["ضوئية", "حرارية", "صوتية", "كيميائية"], correct: 1, rule: "عند حرق الوقود نحصل على طاقة حرارية (حرارة)." },
        { text: "يتكون الوقود الحفري نتيجة تحلل بقايا الكائنات الحية تحت تأثير:", options: ["الضوء والرياح", "الضغط والحرارة", "الماء والبرودة", "الجاذبية والأمطار"], correct: 1, rule: "الضغط والحرارة العالية حولت الكائنات الميتة إلى نفط وفحم." },
        { text: "يعتبر الفحم والنفط من مصادر الطاقة:", options: ["المتجددة", "غير المتجددة", "الدائمة", "الصديقة للبيئة"], correct: 1, rule: "الفحم والنفط ينفدان ولا يتجددان بسرعة، فهو غير متجدد." },
        { text: "الماء والرياح من مصادر الطاقة:", options: ["المتجددة", "غير المتجددة", "الناضبة", "الكيميائية"], correct: 0, rule: "الماء والرياح متجددة لأنها تأتي باستمرار من الطبيعة." },
        { text: "يظهر التلوث بشكل 'ضباب دخاني' بوضوح في:", options: ["القرى الصغيرة", "المدن الكبيرة", "الغابات", "الصحاري"], correct: 1, rule: "المدن الكبيرة بها سيارات ومصانع كثيرة تسبب الضباب الدخاني." },
        { text: "الطاقة الصادرة من الشمس (التي نراها) تسمى طاقة:", options: ["حركية", "إشعاعية", "كيميائية", "صوتية"], correct: 1, rule: "الطاقة الإشعاعية هي التي تنتقل على شكل أشعة ضوئية وحرارية." },
        { text: "تتكون الألواح الشمسية من عدد من الخلايا:", options: ["النباتية", "الشمسية", "الحيوانية", "الرعدية"], correct: 1, rule: "خلايا شمسية تحول ضوء الشمس إلى كهرباء." },
        { text: "يمكن استخدام طواحين الهواء والرياح في توليد:", options: ["الوقود", "الغذاء", "الكهرباء", "الحرارة"], correct: 2, rule: "طواحين الهواء تحول طاقة الرياح إلى كهرباء." },
        { text: "'الطاقة لا تفنى ولا تستحدث من العدم'؛ هذا يسمى قانون:", options: ["بقاء المادة", "بقاء الطاقة", "الجاذبية", "الحركة"], correct: 1, rule: "قانون بقاء الطاقة: الطاقة تتحول من شكل لآخر ولا تفنى." },
        { text: "تحول الألواح الشمسية الطاقة الشمسية مباشرة إلى طاقة:", options: ["حركية", "كهربائية", "صوتية", "كيميائية"], correct: 1, rule: "الألواح الشمسية تحول الضوء مباشرة إلى كهرباء." },
        { text: "عند احتراق الخشب، تتحول الطاقة الكيميائية إلى طاقة:", options: ["حركية", "حرارية", "وضع", "نووية"], correct: 1, rule: "احتراق الخشب يعطي حرارة (طاقة حرارية) وضوء." },
        { text: "المادة التي تصنع منها أسلاك الكهرباء لقدرتها على التوصيل هي:", options: ["البلاستيك", "النحاس", "الخشب", "المطاط"], correct: 1, rule: "النحاس يوصل الكهرباء جيداً، لذلك نصنع منه الأسلاك." },
        { text: "الجهاز الذي يحول الطاقة الكهربائية إلى طاقة حركية هو:", options: ["المصباح", "الغسالة", "المكواة", "الجرس"], correct: 1, rule: "الغسالة والمحرك الكهربائي يحول الكهرباء إلى حركة." },
        { text: "مصادر الطاقة التي تنفد بمجرد استخدامنا لها هي مصادر:", options: ["متجددة", "غير متجددة", "نظيفة", "دائمة"], correct: 1, rule: "مصادر غير متجددة مثل الفحم والبترول تنفد ولا تعوض بسرعة." }
    ];

    let currentIndex = 0;
    const total = examData.length;
    let userAnswers = {};   // حفظ إجابات الطالب { index: selectedOption }

    // دوال مساعدة
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function saveAnswer(qIndex, selectedIdx) {
        userAnswers[qIndex] = selectedIdx;
    }

    function getStoredAnswer(qIndex) {
        return userAnswers[qIndex];
    }

    // تطبيق الإجابة المخزنة عند العودة للسؤال
    function applyStoredAnswerToCurrent() {
        const stored = getStoredAnswer(currentIndex);
        if (stored === undefined) return false;
        const q = examData[currentIndex];
        const isCorrect = (stored === q.correct);
        const optionsDiv = document.getElementById(`options-area-${currentIndex}`);
        if (!optionsDiv) return false;
        const allOpts = optionsDiv.querySelectorAll('.option-card-kid');
        allOpts.forEach((opt, idx) => {
            opt.classList.remove('opt-correct', 'opt-wrong', 'opt-show-correct');
            if (idx === stored) {
                if (isCorrect) opt.classList.add('opt-correct');
                else opt.classList.add('opt-wrong');
            }
            if (idx === q.correct && !isCorrect) {
                opt.classList.add('opt-show-correct');
            }
        });
        const feedbackDiv = document.getElementById(`feedback-${currentIndex}`);
        if (feedbackDiv) {
            const correctAns = q.options[q.correct];
            let msg = '';
            if (isCorrect) {
                msg = `✅ إجابة رائعة! ✅<br>📖 ${q.rule}`;
                feedbackDiv.className = 'feedback-kid feedback-correct-kid';
            } else {
                msg = `❌ إجابة غير صحيحة. ❌<br>✔️ الإجابة الصحيحة: ${correctAns}<br>📖 ${q.rule}`;
                feedbackDiv.className = 'feedback-kid feedback-wrong-kid';
            }
            feedbackDiv.innerHTML = `<i class="fas fa-star-of-life"></i> ${msg}`;
            feedbackDiv.style.display = 'block';
        }
        if (optionsDiv) optionsDiv.classList.add('options-disabled');
        return true;
    }

    // عرض السؤال الحالي
    function renderCurrent() {
        const container = document.getElementById('currentQuestionArea');
        if (!container) return;
        const q = examData[currentIndex];
        const qNumber = currentIndex + 1;

        const questionHtml = `<div class="question-text-kid"><i class="fas fa-question-circle"></i> ${escapeHtml(q.text)}</div>`;
        
        let optionsHtml = `<div class="options-kid" id="options-area-${currentIndex}">`;
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            optionsHtml += `
                <div class="option-card-kid" data-opt-index="${idx}">
                    <div class="opt-letter-kid">${letter}</div>
                    <div class="opt-text-kid">${escapeHtml(opt)}</div>
                </div>
            `;
        });
        optionsHtml += `</div>`;
        const feedbackHtml = `<div class="feedback-kid" id="feedback-${currentIndex}"></div>`;

        const fullCard = `
            <div class="question-card-kid">
                <div class="q-head-kid">
                    <div class="q-num-kid">${qNumber}</div>
                    <div class="q-title-kid">السؤال ${qNumber} من ${total}</div>
                </div>
                ${questionHtml}
                ${optionsHtml}
                ${feedbackHtml}
            </div>
        `;
        container.innerHTML = fullCard;

        // إضافة حدث اختيار الخيارات (event delegation)
        const optionsDiv = document.getElementById(`options-area-${currentIndex}`);
        if (optionsDiv) {
            optionsDiv.classList.remove('options-disabled');
            const clickHandler = (e) => {
                let targetCard = e.target.closest('.option-card-kid');
                if (!targetCard) return;
                if (getStoredAnswer(currentIndex) !== undefined) return; // تم الإجابة سابقًا
                // استخدام getAttribute لضمان التوافق
                const selectedIdx = parseInt(targetCard.getAttribute('data-opt-index'));
                if (isNaN(selectedIdx)) return;
                const qData = examData[currentIndex];
                const isCorrect = (selectedIdx === qData.correct);
                
                saveAnswer(currentIndex, selectedIdx);
                
                const allOpts = optionsDiv.querySelectorAll('.option-card-kid');
                allOpts.forEach((opt, idx) => {
                    opt.classList.remove('opt-correct', 'opt-wrong', 'opt-show-correct');
                    if (idx === selectedIdx) {
                        if (isCorrect) opt.classList.add('opt-correct');
                        else opt.classList.add('opt-wrong');
                    }
                    if (idx === qData.correct && !isCorrect) {
                        opt.classList.add('opt-show-correct');
                    }
                });
                
                const feedbackDiv = document.getElementById(`feedback-${currentIndex}`);
                const correctAns = qData.options[qData.correct];
                let msg = '';
                if (isCorrect) {
                    msg = `✅ إجابة رائعة! ✅<br>📖 ${qData.rule}`;
                    feedbackDiv.className = 'feedback-kid feedback-correct-kid';
                } else {
                    msg = `❌ إجابة غير صحيحة. ❌<br>✔️ الإجابة الصحيحة: ${correctAns}<br>📖 ${qData.rule}`;
                    feedbackDiv.className = 'feedback-kid feedback-wrong-kid';
                }
                feedbackDiv.innerHTML = `<i class="fas fa-lightbulb"></i> ${msg}`;
                feedbackDiv.style.display = 'block';
                
                optionsDiv.classList.add('options-disabled');
            };
            // إزالة المستمع القديم لمنع التكرار
            if (optionsDiv._clickHandler) optionsDiv.removeEventListener('click', optionsDiv._clickHandler);
            optionsDiv._clickHandler = clickHandler;
            optionsDiv.addEventListener('click', optionsDiv._clickHandler);
        }
        
        // استعادة الإجابة المخزنة إن وجدت
        applyStoredAnswerToCurrent();
        
        // تحديث أزرار التنقل
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === total - 1);
        document.getElementById('progressText').innerText = `السؤال ${currentIndex+1} من ${total}`;
    }

    // التنقل
    function nextQuestion() {
        if (currentIndex < total - 1) {
            currentIndex++;
            renderCurrent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    function resetAll() {
        userAnswers = {};
        renderCurrent();
    }

    // ربط الأحداث
    document.getElementById('prevBtn').addEventListener('click', prevQuestion);
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    document.getElementById('resetExamBtn').addEventListener('click', resetAll);
    
    // بدء التشغيل
    renderCurrent();
</script>
</body>
</html>
